              </p>
            </div>
            {mv.vertrag.verlaengerung_typ === "staffel" && (
              <div className="space-y-2">
                <div className="flex items-center justify-between">
                  <Label>Staffeln ab Verlängerung</Label>
                  <Btn variant="ghost" size="sm" icon="plus" onClick={() => updateVertrag("verlaengerung_staffeln", [...(mv.vertrag.verlaengerung_staffeln || []), { datum: "", betrag: "" }])}>Staffel</Btn>
                </div>
                {(mv.vertrag.verlaengerung_staffeln || []).map((s, i) => (
                  <div key={i} className="grid grid-cols-[1fr_1fr_auto] gap-2 items-end">
                    <div><Label>ab Datum</Label><Input type="date" value={s.datum} onChange={(e) => { const arr = [...(mv.vertrag.verlaengerung_staffeln || [])]; arr[i] = { ...arr[i], datum: e.target.value }; updateVertrag("verlaengerung_staffeln", arr); }} /></div>
                    <div><Label>Miete €</Label><Input value={s.betrag} onChange={(e) => { const arr = [...(mv.vertrag.verlaengerung_staffeln || [])]; arr[i] = { ...arr[i], betrag: e.target.value }; updateVertrag("verlaengerung_staffeln", arr); }} /></div>
                    <Btn variant="ghost" size="sm" icon="trash" onClick={() => updateVertrag("verlaengerung_staffeln", (mv.vertrag.verlaengerung_staffeln || []).filter((_, j) => j !== i))}> </Btn>
                  </div>
                ))}
              </div>
            )}
          </div>
        </>)}
      </Section>
      <Section title="Miete & Kosten" icon="euro">
        <div className="grid grid-cols-2 gap-3">
          <div><Label>Grundmiete (kalt) €</Label><Input value={mv.vertrag.grundmiete} onChange={(e) => updateVertrag("grundmiete", e.target.value)} placeholder="450,00" /></div>
          {mv.vertrag.typ === "moebliert" && <div><Label>Möblierungszuschlag €</Label><Input value={mv.vertrag.moebel_zuschlag} onChange={(e) => updateVertrag("moebel_zuschlag", e.target.value)} placeholder="150,00" /></div>}
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div><Label>Betriebskosten-VZ €</Label><Input value={mv.vertrag.nk_vz} onChange={(e) => updateVertrag("nk_vz", e.target.value)} placeholder="80,00" /></div>
          <div><Label>Heizkosten-VZ €</Label><Input value={mv.vertrag.hk_vz} onChange={(e) => updateVertrag("hk_vz", e.target.value)} placeholder="100,00" /></div>
        </div>
        <div><Label>Zahlbar bis zum ... Werktag</Label><Input value={mv.vertrag.zahlungstag} onChange={(e) => updateVertrag("zahlungstag", e.target.value)} placeholder="3" /></div>
        {mv.vertrag.typ === "moebliert" && (
          <div className="mt-2 p-3 bg-stone-100 border border-stone-300 rounded-lg space-y-2">
            <Label>Mietanpassungs-Klausel (optional)</Label>
            <Select value={mv.vertrag.moebliert_anpassung || "keine"} onChange={(e) => updateVertrag("moebliert_anpassung", e.target.value)}>
              <option value="keine">keine (Festmiete für die gesamte Befristung)</option>
              <option value="staffel">Staffelmiete (vereinbarte Erhöhungen zu Terminen)</option>
              <option value="index">Indexmiete (Verbraucherpreisindex)</option>
            </Select>
            <p className="text-xs text-stone-600">Bei kurzer Befristung (≤ 12 Monate) ist eine Indexanpassung wirkungslos – frühestens 12 Monate nach Mietbeginn anpassbar.</p>
          </div>
        )}
        {(mv.vertrag.typ === "staffel" || (mv.vertrag.typ === "moebliert" && mv.vertrag.moebliert_anpassung === "staffel")) && (
          <div className="mt-2 p-3 bg-amber-50 border border-amber-200 rounded-lg space-y-3">
            <div className="flex items-center justify-between"><Label>Mietstaffeln</Label><Btn variant="ghost" size="sm" icon="plus" onClick={addStaffel}>Staffel</Btn></div>
            {mv.vertrag.staffeln.length === 0 && <p className="text-xs text-stone-500 italic">Jede Staffel muss mind. 12 Monate auseinander liegen.</p>}
            {mv.vertrag.staffeln.map((s, i) => (
              <div key={i} className="grid grid-cols-[1fr_1fr_auto] gap-2 items-end">
                <div><Label>ab</Label><Input type="date" value={s.datum} onChange={(e) => updateStaffel(i, "datum", e.target.value)} /></div>
                <div><Label>neue Miete €</Label><Input value={s.betrag} onChange={(e) => updateStaffel(i, "betrag", e.target.value)} /></div>
                <Btn variant="ghost" size="sm" icon="trash" onClick={() => removeStaffel(i)}> </Btn>
              </div>
            ))}
          </div>
        )}
        {(mv.vertrag.typ === "index" || (mv.vertrag.typ === "moebliert" && mv.vertrag.moebliert_anpassung === "index")) && (
          <div className="mt-2 p-3 bg-sky-50 border border-sky-200 rounded-lg space-y-2">
            <Label>Index-Stammdaten</Label>
            <div className="grid grid-cols-3 gap-2">
              <div><Label>Basisjahr</Label><Input value={mv.vertrag.index_basisjahr} onChange={(e) => updateVertrag("index_basisjahr", e.target.value)} placeholder="2020" /></div>
              <div><Label>Indexstand bei Beginn</Label><Input value={mv.vertrag.index_basiswert} onChange={(e) => updateVertrag("index_basiswert", e.target.value)} placeholder="z. B. 119,2" /></div>
              <div><Label>Indexmonat</Label><Input value={mv.vertrag.index_basismonat} onChange={(e) => updateVertrag("index_basismonat", e.target.value)} placeholder="z. B. März 2025" /></div>
            </div>
            <p className="text-xs text-stone-600">Aktuellen VPI auf destatis.de abrufen. Basisjahr 2020 = 100.</p>
          </div>
        )}
        <div className="grid grid-cols-2 gap-3 mt-2">
          <div>
            <Label>Kaution €</Label>
            <Input value={mv.vertrag.kaution} onChange={(e) => updateVertrag("kaution", e.target.value)} placeholder="1.350,00" />
            <p className="text-xs text-stone-500 mt-1">Max. 3 Nettokaltmieten (§ 551 BGB)</p>
          </div>
          <div>
            <Label>Anzahl Raten</Label>
            <Select value={mv.vertrag.kaution_raten} onChange={(e) => updateVertrag("kaution_raten", e.target.value)}>
              <option value="1">1 (Einmalzahlung)</option>
              <option value="2">2 Raten</option>
              <option value="3">3 Raten</option>
            </Select>
          </div>
        </div>
      </Section>
      <Section title="Schlüssel" icon="key">
        <div className="grid grid-cols-3 gap-3">
          <div><Label>Wohnung</Label><Input value={mv.vertrag.schluessel_wohnung} onChange={(e) => updateVertrag("schluessel_wohnung", e.target.value)} /></div>
          <div><Label>Haustür</Label><Input value={mv.vertrag.schluessel_haus} onChange={(e) => updateVertrag("schluessel_haus", e.target.value)} /></div>
          <div><Label>Briefkasten</Label><Input value={mv.vertrag.schluessel_briefkasten} onChange={(e) => updateVertrag("schluessel_briefkasten", e.target.value)} /></div>
        </div>
        <div><Label>Sonstige</Label><Input value={mv.vertrag.schluessel_sonstige} onChange={(e) => updateVertrag("schluessel_sonstige", e.target.value)} placeholder="z. B. Keller, Boden" /></div>
      </Section>
      <Section title="Weitere Vereinbarungen" icon="scroll">
        <div>
          <Label>Übergabezustand der Wohnung</Label>
          <Select value={mv.vertrag.uebergabezustand} onChange={(e) => updateVertrag("uebergabezustand", e.target.value)}>
            <option value="renoviert">renoviert</option>
            <option value="unrenoviert">unrenoviert</option>
          </Select>
          <p className="text-xs text-stone-500 mt-1">Bei „unrenoviert" wird Schönheitsreparaturen-Übertragung automatisch deaktiviert (BGH VIII ZR 185/14).</p>
        </div>
        <div>
          <Label>Tierhaltung</Label>
          <Select value={mv.vertrag.tierhaltung} onChange={(e) => updateVertrag("tierhaltung", e.target.value)}>
            <option value="kleintiere">Kleintiere erlaubt, Hund/Katze auf Anfrage</option>
            <option value="auf_anfrage">Nur Kleintiere, alles andere auf Anfrage</option>
            <option value="verboten">Kein Hund/Katze ohne Zustimmung</option>
          </Select>
        </div>
        <div className={`flex items-start gap-3 p-3 border rounded-md ${mv.vertrag.uebergabezustand === "unrenoviert" ? "bg-stone-100 border-stone-300 opacity-60" : "bg-red-50 border-red-200"}`}>
          <input type="checkbox" checked={mv.vertrag.schoenheitsreparaturen_uebertragen && mv.vertrag.uebergabezustand === "renoviert"} disabled={mv.vertrag.uebergabezustand === "unrenoviert"} onChange={(e) => updateVertrag("schoenheitsreparaturen_uebertragen", e.target.checked)} className="mt-1 w-4 h-4 accent-stone-900" />
          <div className="flex-1">
            <span className="text-sm font-medium text-stone-900">Schönheitsreparaturen auf Mieter übertragen</span>
            <p className="text-xs text-red-800 mt-1">{mv.vertrag.uebergabezustand === "unrenoviert" ? "Bei unrenovierter Übergabe rechtlich unwirksam (BGH VIII ZR 185/14)." : "Nur wirksam bei renovierter Übergabe."}</p>
          </div>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <Label>Kleinreparatur-Grenze € / Einzelfall</Label>
            <Input value={mv.vertrag.kleinreparatur_einzelfall} onChange={(e) => updateVertrag("kleinreparatur_einzelfall", e.target.value)} />
            <p className="text-xs text-stone-500 mt-1">Üblich 100 €, max. 120 € (BGH)</p>
          </div>
          <div>
            <Label>Jahresanteil in %</Label>
            <Input value={mv.vertrag.kleinreparatur_jahresanteil} onChange={(e) => updateVertrag("kleinreparatur_jahresanteil", e.target.value)} />
            <p className="text-xs text-stone-500 mt-1">Üblich 6–8 %</p>
          </div>
        </div>
        <div><Label>Sonstige Vereinbarungen (Freitext)</Label><Textarea rows={3} value={mv.vertrag.sonstige_vereinbarungen} onChange={(e) => updateVertrag("sonstige_vereinbarungen", e.target.value)} /></div>
      </Section>
      <Section title="Eigene Vertragsklauseln" icon="edit" action={<Btn variant="ghost" size="sm" icon="plus" onClick={addKlausel}>Klausel</Btn>}>
        {mv.vertrag.eigene_klauseln.length === 0 && <p className="text-xs text-stone-500 italic">z. B. „Gartennutzung", „Stellplatz", „Internet/TV".</p>}
        {mv.vertrag.eigene_klauseln.map((kl, idx) => (
          <div key={kl.id} className="p-3 bg-stone-50 border border-stone-200 rounded-lg space-y-2">
            <div className="flex items-center justify-between">
              <span className="text-[10px] uppercase tracking-wider font-semibold text-stone-500">Zusatz-§ {idx + 1}</span>
              <Btn variant="ghost" size="sm" icon="trash" onClick={() => removeKlausel(kl.id)}> </Btn>
            </div>
            <Input value={kl.titel} onChange={(e) => updateKlausel(kl.id, "titel", e.target.value)} placeholder="Überschrift" />
            <Textarea rows={4} value={kl.text} onChange={(e) => updateKlausel(kl.id, "text", e.target.value)} placeholder="Vereinbarungstext..." />
          </div>
        ))}
      </Section>
      {mv.vertrag.typ === "moebliert" && (() => {
        const RAEUME = ["Wohnzimmer", "Schlafzimmer", "Küche", "Bad", "Flur", "Balkon", "Keller", "Sonstiges"];
        const alleRaeume = [...new Set([...RAEUME, ...mv.moebel.map(m => m.raum || "Sonstiges")])];
        return (
          <Section title="Inventarliste nach Räumen" icon="clipboard">
            <InfoBox variant="info">Gegenstände werden nach Räumen gruppiert. Wähle beim Hinzufügen den passenden Raum.</InfoBox>
            <div className="flex flex-wrap gap-2 mb-2">
              {RAEUME.map(r => (
                <Btn key={r} variant="secondary" size="sm" icon="plus" onClick={() => addMoebel(r)}>{r}</Btn>
              ))}
            </div>
            {alleRaeume.map(raum => {
              const items = mv.moebel.map((m, i) => ({ ...m, _i: i })).filter(m => (m.raum || "Sonstiges") === raum);
              if (items.length === 0) return null;
              return (
                <div key={raum} className="mb-4">
                  <div className="text-xs font-label tracking-[0.22em] uppercase text-ember mb-2 pb-1 border-b border-ember/30">{raum}</div>
                  <div className="space-y-2">
                    {items.map(m => (
                      <div key={m._i} className="space-y-1.5 p-2 bg-bone border border-ink/10 rounded-sm">
                        <div className="grid grid-cols-[1fr_auto] gap-2 items-start">
                          <Input value={m.bezeichnung} onChange={(e) => updateMoebel(m._i, "bezeichnung", e.target.value)} placeholder="Gegenstand" />
                          <Btn variant="ghost" size="sm" icon="trash" onClick={() => removeMoebel(m._i)}> </Btn>
                        </div>
                        <div className="grid grid-cols-3 gap-2">
                          <div>
                            <Label>Zustand</Label>
                            <Select value={m.zustand} onChange={(e) => updateMoebel(m._i, "zustand", e.target.value)}>
                              <option value="neuwertig">neuwertig</option><option value="sehr gut">sehr gut</option><option value="gut">gut</option><option value="gebraucht">gebraucht</option>
                            </Select>
                          </div>
                          <div>
                            <Label>Zeitwert €</Label>
                            <Input value={m.zeitwert || ""} onChange={(e) => updateMoebel(m._i, "zeitwert", e.target.value)} placeholder="z. B. 350" />
                          </div>
                          <div>
                            <Label>Anschaffungsjahr</Label>
                            <Input value={m.anschaffungsjahr || ""} onChange={(e) => updateMoebel(m._i, "anschaffungsjahr", e.target.value)} placeholder="z. B. 2022" />
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
            {mv.moebel.length === 0 && <p className="text-sm text-smoke italic">Noch kein Inventar. Raum-Button oben klicken.</p>}
          </Section>
        );
      })()}
    </div>
  );
}

function UebergabeForm({ state, setState, previewDoc, setPreviewDoc }) {
  const mv = getActiveMV(state);
  if (!mv) return <InfoBox variant="warn">Kein Mietverhältnis aktiv.</InfoBox>;
  const einheit = getMVEinheit(state, mv);

              <div><Label>Zählernummer</Label><Input value={mv.uebergabe[nrK]} onChange={(e) => updateUE({ [nrK]: e.target.value })} placeholder={einheit && einheit[nrK] ? `aus Einheit: ${einheit[nrK]}` : ""} /></div>
              <div><Label>Stand</Label><Input value={mv.uebergabe[stK]} onChange={(e) => updateUE({ [stK]: e.target.value })} /></div>
            </div>

        </Section>
        <Section title="Räume" icon="home" action={<Btn variant="ghost" size="sm" icon="plus" onClick={addRaum}>Raum</Btn>}>
          {mv.uebergabe.raeume.map((r, i) => (

              <div className="flex items-end gap-2">

              <div><Label>Zustand</Label><Input value={r.zustand} onChange={(e) => updateRaum(i, "zustand", e.target.value)} placeholder="renoviert, Laminat neu, Wände weiß" /></div>

        <Section title="Rauchwarnmelder" icon="shield">
          <div className="grid grid-cols-2 gap-3 items-end">

          <Textarea rows={4} value={mv.uebergabe.bemerkungen} onChange={(e) => updateUE({ bemerkungen: e.target.value })} />
        </Section>
      </>)}

      {mode === "auszug" && (<>
        <InfoBox variant="info">Beim Auszug Rückgabezustand dokumentieren – Vergleich mit Einzugszustand erfolgt automatisch im Druckdokument. Schäden mit Kostenschätzung erfassen, die fließen direkt in die Kautionsabrechnung ein.</InfoBox>
        <Section title="Rückgabedatum" icon="calendar">
          <Input type="date" value={az.datum || ""} onChange={(e) => updateAZ({ datum: e.target.value })} />
        </Section>
        <Section title="End-Zählerstände" icon="clipboard">
          {[["strom_stand_end","Strom","strom_stand"],["gas_stand_end","Gas","gas_stand"],["wasser_kalt_stand_end","Wasser kalt","wasser_kalt_stand"],["wasser_warm_stand_end","Wasser warm","wasser_warm_stand"],["heizung_stand_end","Heizung","heizung_stand"]].map(([k, lbl, einK]) => (
            <div key={k} className="grid grid-cols-[100px_1fr_1fr] gap-3 items-end">
              <div className="text-sm text-stone-700 pb-2 font-medium">{lbl}</div>
              <div><Label>Stand Einzug</Label><Input value={mv.uebergabe[einK] || ""} disabled className="!bg-stone-100" /></div>
              <div><Label>Stand Auszug</Label><Input value={az[k] || ""} onChange={(e) => updateAZ({ [k]: e.target.value })} /></div>
            </div>
          ))}
        </Section>
        <Section title="Schlüssel zurückerhalten" icon="key">
          <div className="grid grid-cols-3 gap-3">
            <div><Label>Wohnung</Label><Input value={az.schluessel_zurueck_wohnung || ""} onChange={(e) => updateAZ({ schluessel_zurueck_wohnung: e.target.value })} placeholder={`Einzug: ${mv.vertrag.schluessel_wohnung}`} /></div>
            <div><Label>Haustür</Label><Input value={az.schluessel_zurueck_haus || ""} onChange={(e) => updateAZ({ schluessel_zurueck_haus: e.target.value })} placeholder={`Einzug: ${mv.vertrag.schluessel_haus}`} /></div>
            <div><Label>Briefkasten</Label><Input value={az.schluessel_zurueck_briefkasten || ""} onChange={(e) => updateAZ({ schluessel_zurueck_briefkasten: e.target.value })} placeholder={`Einzug: ${mv.vertrag.schluessel_briefkasten}`} /></div>
          </div>
        </Section>
        <Section title="Zustand der Räume + Schäden" icon="home" action={<Btn variant="ghost" size="sm" icon="plus" onClick={addAZRaum}>Raum</Btn>}>
          {(az.raeume || []).length === 0 && <Btn variant="secondary" size="sm" onClick={() => updateAZ({ raeume: mv.uebergabe.raeume.map((r) => ({ name: r.name, zustand_aktuell: "", schaeden: "", kosten_geschaetzt: "" })) })}>Räume aus Einzug übernehmen</Btn>}
          {(az.raeume || []).map((r, i) => (
            <div key={i} className="p-3 bg-stone-50 border border-stone-200 rounded-lg space-y-2">

              <div><Label>Schäden (über normale Abnutzung hinaus)</Label><Input value={r.schaeden || ""} onChange={(e) => updateAZRaum(i, "schaeden", e.target.value)} placeholder="z. B. Brandloch im Laminat, Wasserschaden Wand" /></div>
              <div><Label>Kostenschätzung € (für Kautionsabrechnung)</Label><Input value={r.kosten_geschaetzt || ""} onChange={(e) => updateAZRaum(i, "kosten_geschaetzt", e.target.value)} placeholder="150,00" /></div>
            </div>
          ))}
        </Section>
        <Section title="Schönheitsreparaturen-Status" icon="scroll">
          <Select value={az.schoenheitsrep_status || "nicht_erforderlich"} onChange={(e) => updateAZ({ schoenheitsrep_status: e.target.value })}>
            <option value="nicht_erforderlich">Nicht erforderlich (Vertrag/BGH)</option>
            <option value="durchgefuehrt">Vom Mieter durchgeführt</option>
            <option value="teilweise">Teilweise durchgeführt</option>
            <option value="nicht_durchgefuehrt">NICHT durchgeführt (Schadensersatz möglich)</option>
          </Select>
          {(az.schoenheitsrep_status === "nicht_durchgefuehrt" || az.schoenheitsrep_status === "teilweise") && mv.vertrag.schoenheitsreparaturen_uebertragen && (
            <InfoBox variant="warn">Nur Schadensersatz möglich, wenn Schönheitsreparatur-Klausel im Vertrag wirksam war (renovierte Übergabe). Andernfalls keine Forderung. Kostenschätzung Maler einholen.</InfoBox>
          )}
        </Section>
        <Section title="Bemerkungen">
          <Textarea rows={4} value={az.bemerkungen || ""} onChange={(e) => updateAZ({ bemerkungen: e.target.value })} placeholder="z. B. Tapete im Schlafzimmer abgelöst, Vermieter erkennt als normale Abnutzung an. Bohrlöcher fachgerecht verschlossen." />
        </Section>
      </>)}
    </div>
  );
}


function HausordnungForm({ state, setState }) {
  const updatePara = (id, k, v) => setState((s) => ({ ...s, hausordnung: { ...s.hausordnung, paragraphen: s.hausordnung.paragraphen.map((p) => p.id === id ? { ...p, [k]: v } : p) } }));
  const addPara = () => setState((s) => ({ ...s, hausordnung: { ...s.hausordnung, paragraphen: [...s.hausordnung.paragraphen, { id: `ho_${Date.now()}`, titel: "", text: "" }] } }));
  const removePara = (id) => setState((s) => ({ ...s, hausordnung: { ...s.hausordnung, paragraphen: s.hausordnung.paragraphen.filter((p) => p.id !== id) } }));
  const movePara = (idx, dir) => setState((s) => {
    const arr = [...s.hausordnung.paragraphen];
    const ni = idx + dir;
    if (ni < 0 || ni >= arr.length) return s;
    [arr[idx], arr[ni]] = [arr[ni], arr[idx]];
    return { ...s, hausordnung: { ...s.hausordnung, paragraphen: arr } };
  });
  const resetHO = () => {
    if (confirm("Hausordnung auf Standardtext zurücksetzen?")) {
      setState((s) => ({ ...s, hausordnung: { paragraphen: JSON.parse(JSON.stringify(DEFAULT_HAUSORDNUNG)) } }));
    }
  };
  return (
    <div className="space-y-4">
      <InfoBox variant="info">Hausordnung gilt für alle Mietverhältnisse.</InfoBox>
      <div className="flex gap-2"><Btn variant="secondary" icon="plus" onClick={addPara}>Paragraph</Btn><Btn variant="secondary" icon="reset" onClick={resetHO}>Standard</Btn></div>
      {state.hausordnung.paragraphen.map((p, idx) => (
        <div key={p.id} className="p-3 bg-stone-50 border border-stone-200 rounded-lg space-y-2">
          <div className="flex items-center justify-between">
            <span className="text-[10px] uppercase tracking-wider font-semibold text-stone-500">§ {idx + 1}</span>
            <div className="flex gap-1">
              <Btn variant="ghost" size="sm" onClick={() => movePara(idx, -1)} disabled={idx === 0}>↑</Btn>
              <Btn variant="ghost" size="sm" onClick={() => movePara(idx, 1)} disabled={idx === state.hausordnung.paragraphen.length - 1}>↓</Btn>
              <Btn variant="ghost" size="sm" icon="trash" onClick={() => removePara(p.id)}> </Btn>
            </div>
          </div>
          <Input value={p.titel} onChange={(e) => updatePara(p.id, "titel", e.target.value)} placeholder="Überschrift" />
          <Textarea rows={4} value={p.text} onChange={(e) => updatePara(p.id, "text", e.target.value)} />
        </div>
      ))}
    </div>
  );
}

function SchreibenForm({ state, setState, previewDoc, setPreviewDoc }) {
  const mv = getActiveMV(state);
  if (!mv) return <InfoBox variant="warn">Kein Mietverhältnis aktiv.</InfoBox>;
  const updateSchreiben = (key, patch) => setState((s) => ({ ...s, mietverhaeltnisse: s.mietverhaeltnisse.map((m) => m.id === mv.id ? { ...m, schreiben: { ...m.schreiben, [key]: { ...(m.schreiben[key] || {}), ...patch } } } : m) }));
  const updateKaution = (patch) => setState((s) => ({ ...s, mietverhaeltnisse: s.mietverhaeltnisse.map((m) => m.id === mv.id ? { ...m, kautionsabrechnung: { ...(m.kautionsabrechnung || {}), ...patch } } : m) }));
  const m = mv.schreiben.mahnung;
  const e = mv.schreiben.mieterhoehung_index;
  const e2 = mv.schreiben.mieterhoehung_558 || { datum_heute: "", neue_miete: "", datum_letzte_erhoehung: "", begruendung: "", wirksam_ab: "" };
  const mo = mv.schreiben.modernisierung || { datum_heute: "", art: "", detail: "", kosten_brutto: "", erhaltungsanteil: "", drittmittel: "", wirksam_ab: "" };
  const ka = mv.kautionsabrechnung || {};
  const einheit = getMVEinheit(state, mv);
  const alteMiete = parseFloat(mv.vertrag.grundmiete || "0");
  const neueMiete = parseFloat(e2.neue_miete || "0");
  const proz = (alteMiete > 0 && neueMiete > 0) ? (((neueMiete - alteMiete) / alteMiete) * 100) : 0;

  const moKosten = parseFloat(mo.kosten_brutto || "0");
  const moErh = parseFloat(mo.erhaltungsanteil || "0");
  const moDri = parseFloat(mo.drittmittel || "0");
  const moUmlage = Math.max(0, moKosten - moErh - moDri);
  const moMonat = (moUmlage * 0.08) / 12;
  const moFlaeche = parseFloat((einheit && einheit.wohnflaeche) || "0");
  const moProQm = moFlaeche > 0 ? moMonat / moFlaeche : 0;

  return (
    <div className="space-y-6">
      <Section title="Schreiben auswählen">
        <div className="grid grid-cols-2 gap-2">
          <Btn variant={previewDoc === "mahnung" ? "primary" : "secondary"} icon="bell" onClick={() => setPreviewDoc("mahnung")}>Mahnung</Btn>
          <Btn variant={previewDoc === "mieterhoehung" ? "primary" : "secondary"} icon="trending" onClick={() => setPreviewDoc("mieterhoehung")}>Mieterhöhung Index</Btn>
          <Btn variant={previewDoc === "mieterhoehung558" ? "primary" : "secondary"} icon="trending" onClick={() => setPreviewDoc("mieterhoehung558")}>Mieterhöhung § 558</Btn>
          <Btn variant={previewDoc === "modernisierung" ? "primary" : "secondary"} icon="trending" onClick={() => setPreviewDoc("modernisierung")}>Modernisierung § 559</Btn>
          <Btn variant={previewDoc === "kautionsabrechnung" ? "primary" : "secondary"} icon="euro" onClick={() => setPreviewDoc("kautionsabrechnung")} className="col-span-2">Kautionsabrechnung (nach Auszug)</Btn>
        </div>
      </Section>
      {previewDoc === "mahnung" && (
        <Section title="Mahnung wegen Zahlungsverzug" icon="bell">
          <div>
            <Label>Mahnstufe</Label>
            <Select value={m.stufe} onChange={(ev) => updateSchreiben("mahnung", { stufe: ev.target.value })}>
              <option value="1">1. Zahlungserinnerung (freundlich)</option>
              <option value="2">2. Mahnung (Fristsetzung)</option>
              <option value="3">3. Letzte Mahnung vor Kündigung (§ 543 BGB)</option>
            </Select>
          </div>
          <div><Label>Datum heute</Label><Input type="date" value={m.datum_heute} onChange={(ev) => updateSchreiben("mahnung", { datum_heute: ev.target.value })} /></div>
          <div><Label>Offene Monate (Liste)</Label><Input value={m.offene_monate} onChange={(ev) => updateSchreiben("mahnung", { offene_monate: ev.target.value })} placeholder="z. B. März 2026, April 2026" /></div>
          <div><Label>Gesamtrückstand €</Label><Input value={m.rueckstand_betrag} onChange={(ev) => updateSchreiben("mahnung", { rueckstand_betrag: ev.target.value })} placeholder="1.200,00" /></div>
          {m.stufe === "3" && <div><Label>Rückstand in Monatsmieten</Label><Input value={m.rueckstand_monate} onChange={(ev) => updateSchreiben("mahnung", { rueckstand_monate: ev.target.value })} placeholder="2" /></div>}
          <div><Label>Zahlungsfrist (Datum)</Label><Input type="date" value={m.zahlungsfrist} onChange={(ev) => updateSchreiben("mahnung", { zahlungsfrist: ev.target.value })} /></div>
          <InfoBox variant="legal"><strong>Fristlose Kündigung</strong> ist möglich, wenn der Rückstand 2 Monatsmieten erreicht oder über 2 aufeinanderfolgende Termine teils ausbleibt (§ 543 II Nr. 3 BGB). Vor Räumungsklage immer Stufe 3 abmahnen.</InfoBox>
        </Section>

      {previewDoc === "mieterhoehung" && (

        <Section title="Mieterhöhung § 558 BGB (Vergleichsmiete)" icon="trending">
          <div><Label>Datum heute</Label><Input type="date" value={e2.datum_heute} onChange={(ev) => updateSchreiben("mieterhoehung_558", { datum_heute: ev.target.value })} /></div>
          <div><Label>Datum letzte Mieterhöhung</Label><Input type="date" value={e2.datum_letzte_erhoehung} onChange={(ev) => updateSchreiben("mieterhoehung_558", { datum_letzte_erhoehung: ev.target.value })} /></div>
          <div><Label>Verlangte neue Nettokaltmiete €</Label><Input value={e2.neue_miete} onChange={(ev) => updateSchreiben("mieterhoehung_558", { neue_miete: ev.target.value })} placeholder="zielwert nahe Obergrenze des Mietspiegelfelds" /></div>
          {alteMiete > 0 && neueMiete > 0 && (
            <div className="p-2 bg-stone-100 border border-stone-300 rounded text-xs space-y-1">
              <div>Erhöhung: <strong>{(neueMiete - alteMiete).toFixed(2).replace(".", ",")} €</strong> ({proz.toFixed(2).replace(".", ",")} %)</div>
              {proz > 20 && <div className="text-red-700 font-semibold">⚠ Kappungsgrenze 20% überschritten</div>}
              {proz > 15 && proz <= 20 && <div className="text-amber-700">Achtung: Mit Kappungsgrenzen-Verordnung gilt 15 %.</div>}
              {proz > 0 && proz <= 15 && <div className="text-emerald-700">In zulässiger Spanne. Falls möglich, Kappungsgrenze ausreizen.</div>}
            </div>
          )}
          <div><Label>Begründung (Mietspiegel + Ausstattungsmerkmale)</Label><Textarea rows={6} value={e2.begruendung} onChange={(ev) => updateSchreiben("mieterhoehung_558", { begruendung: ev.target.value })} placeholder="z. B.: Mietspiegel Bremerhaven, Stand 01/2025, Feld B2 (Bj. 1950-1969, mittlere Lage, gehobene Ausstattung): 5,80 - 7,40 €/m². Wertbildende Merkmale: modernisiertes Bad (2022), Einbauküche, Balkon, energetische Sanierung (2020). Einordnung am oberen Rand begründet." /></div>
          <div><Label>Wirksam ab</Label><Input type="date" value={e2.wirksam_ab} onChange={(ev) => updateSchreiben("mieterhoehung_558", { wirksam_ab: ev.target.value })} /></div>
          <InfoBox variant="success"><strong>Strategie:</strong> Ziel = Obergrenze des Mietspiegelfelds. Konkrete Ausstattungsmerkmale auflisten (Modernisierungen mit Datum, Einbauküche, Balkon, Aufzug). Je mehr Merkmale dokumentiert, desto höher der gerichtsfeste Ansatz. Kappungsgrenze alle 3 Jahre konsequent ausreizen.</InfoBox>
          <InfoBox variant="legal">Wartefrist 15 Monate seit letzter Erhöhung · Kappungsgrenze 20 % in 3 Jahren · Zustimmungsfrist Mieter 2 Monate · Klagefrist Vermieter 3 Monate. Bremerhaven hat einen qualifizierten Mietspiegel (§ 558d BGB, höchste Beweiskraft).</InfoBox>
        </Section>
      )}
      {previewDoc === "modernisierung" && (
        <Section title="Modernisierungs-Mieterhöhung § 559 BGB" icon="trending">
          <div><Label>Datum heute</Label><Input type="date" value={mo.datum_heute} onChange={(ev) => updateSchreiben("modernisierung", { datum_heute: ev.target.value })} /></div>
          <div><Label>Art der Modernisierung (Kurzbezeichnung)</Label><Input value={mo.art} onChange={(ev) => updateSchreiben("modernisierung", { art: ev.target.value })} placeholder="z. B. Energetische Fassadendämmung + Heizungsmodernisierung" /></div>
          <div><Label>Detail-Beschreibung</Label><Textarea rows={4} value={mo.detail} onChange={(ev) => updateSchreiben("modernisierung", { detail: ev.target.value })} placeholder="Konkrete Maßnahmen: Außendämmung WDVS 14 cm, Austausch Gas-Brennwerttherme, neue Trinkwasserleitungen aus Edelstahl, Einbau Smart-Thermostate." /></div>
          <div className="grid grid-cols-3 gap-3">
            <div><Label>Gesamtkosten € (brutto)</Label><Input value={mo.kosten_brutto} onChange={(ev) => updateSchreiben("modernisierung", { kosten_brutto: ev.target.value })} placeholder="30.000,00" /></div>
            <div><Label>Erhaltungsanteil € <span className="text-stone-400 normal-case font-normal">abziehen</span></Label><Input value={mo.erhaltungsanteil} onChange={(ev) => updateSchreiben("modernisierung", { erhaltungsanteil: ev.target.value })} placeholder="9.000,00" /></div>
            <div><Label>Drittmittel € <span className="text-stone-400 normal-case font-normal">KfW etc.</span></Label><Input value={mo.drittmittel} onChange={(ev) => updateSchreiben("modernisierung", { drittmittel: ev.target.value })} placeholder="5.000,00" /></div>
          </div>
          {moKosten > 0 && (
            <div className="p-3 bg-emerald-50 border border-emerald-200 rounded text-xs space-y-1">
              <div>Umlagefähig: <strong>{fmtEUR(moUmlage)}</strong></div>
              <div>× 8% p.a. = <strong>{fmtEUR(moUmlage * 0.08)}</strong> Jahresumlage</div>
              <div className="text-base font-bold text-emerald-900 mt-1">+ {fmtEUR(moMonat)} / Monat dauerhaft{moFlaeche > 0 && ` (${moProQm.toFixed(2).replace(".", ",")} €/m²)`}</div>
              {moProQm > 3 && <div className="text-red-700 font-semibold mt-1">⚠ Kappungsgrenze 3 €/m² in 6 Jahren prüfen!</div>}
              {moProQm > 2 && moProQm <= 3 && alteMiete > 0 && moFlaeche > 0 && (alteMiete / moFlaeche) < 7 && <div className="text-amber-700">⚠ Vor-Miete &lt; 7 €/m² – dann gilt Kappungsgrenze 2 €/m²</div>}
            </div>
          )}
          <div><Label>Wirksam ab <span className="text-stone-400 normal-case font-normal">mind. 3 Monate nach Zugang</span></Label><Input type="date" value={mo.wirksam_ab} onChange={(ev) => updateSchreiben("modernisierung", { wirksam_ab: ev.target.value })} /></div>
          <InfoBox variant="success"><strong>Strategie § 559:</strong> Der größte Hebel im Bestand. Bei 30 k€ Bad-/Heizungs-Modernisierung sind 200 €/Monat dauerhaft umlegbar (= 12 % Brutto-Rendite auf das Modernisierungs-Invest aus laufender Miete). Erhaltungsanteil ehrlich abziehen (oft 30-40 % bei Mischmaßnahmen). KfW-Förderung ist Drittmittel und muss abgezogen werden. Mieter hat KEIN Zustimmungsrecht (anders als §558), nur Härtefall-Einrede.</InfoBox>
          <InfoBox variant="legal"><strong>Pflichten:</strong> 3 Monate vor Maßnahme Modernisierungsankündigung (§ 555c BGB) · Erhöhungserklärung in Textform mit Erläuterung · Wirksam ab 3. Monat nach Zugang · Härtefall-Frist Mieter: Monat vor Beginn der Erhöhung · Kappungsgrenze: 3 €/m² in 6 Jahren (2 €/m² wenn Vor-Miete unter 7 €/m²)</InfoBox>
        </Section>
      )}
      {previewDoc === "kautionsabrechnung" && (
        <Section title="Kautionsabrechnung" icon="euro">
          <InfoBox variant="info">Erstelle die Abrechnung nach Auszug. Pflicht: Auszahlung innerhalb angemessener Frist (BGH: meist 6 Monate, je nach Komplexität). Einbehalt für noch offene Betriebskostenabrechnung ist zulässig (BGH VIII ZR 71/05).</InfoBox>
          <div><Label>Datum heute</Label><Input type="date" value={ka.datum_heute || ""} onChange={(ev) => updateKaution({ datum_heute: ev.target.value })} /></div>
          <div className="grid grid-cols-2 gap-3">
            <div><Label>Kaution eingezahlt €</Label><Input value={ka.kaution_eingezahlt || mv.vertrag.kaution || ""} onChange={(ev) => updateKaution({ kaution_eingezahlt: ev.target.value })} placeholder={mv.vertrag.kaution || "1.350,00"} /></div>
            <div><Label>Zinsen €</Label><Input value={ka.zinsen || ""} onChange={(ev) => updateKaution({ zinsen: ev.target.value })} placeholder="0,00" /></div>
          </div>
          <div className="space-y-2 pt-2 border-t border-stone-200">
            <Label>Offene Forderungen (Abzüge)</Label>
            <div className="grid grid-cols-[1fr_140px] gap-2">
              <Input value={ka.offene_mieten_grund || ""} onChange={(ev) => updateKaution({ offene_mieten_grund: ev.target.value })} placeholder="Grund offene Miete" />
              <Input value={ka.offene_mieten || ""} onChange={(ev) => updateKaution({ offene_mieten: ev.target.value })} placeholder="Betrag €" />
            </div>
            <div className="grid grid-cols-[1fr_140px] gap-2">
              <Textarea rows={2} value={ka.schadensersatz_details || ""} onChange={(ev) => updateKaution({ schadensersatz_details: ev.target.value })} placeholder="Schadensersatz (Details aus Auszugsprotokoll)" />
              <Input value={ka.schadensersatz || ""} onChange={(ev) => updateKaution({ schadensersatz: ev.target.value })} placeholder="Betrag €" />
            </div>
            <div className="grid grid-cols-[1fr_140px] gap-2">
              <Input value={ka.einbehalt_bka_grund || ""} onChange={(ev) => updateKaution({ einbehalt_bka_grund: ev.target.value })} placeholder="Einbehalt BKA (z. B. BKA 2025 noch offen)" />
              <Input value={ka.einbehalt_bka || ""} onChange={(ev) => updateKaution({ einbehalt_bka: ev.target.value })} placeholder="Betrag €" />
            </div>
          </div>
          <div className="space-y-2 pt-2 border-t border-stone-200">
            <Label>Auszahlung an</Label>
            <Input value={ka.auszahlung_an_name || ""} onChange={(ev) => updateKaution({ auszahlung_an_name: ev.target.value })} placeholder="Name Kontoinhaber" />
            <Input value={ka.auszahlung_iban || ""} onChange={(ev) => updateKaution({ auszahlung_iban: ev.target.value })} placeholder="IBAN" />
          </div>
        </Section>
      )}
    </div>
  );
}

async function exportDocx(state) {
  if (typeof docx === "undefined") { alert("DOCX-Library nicht verfügbar – bitte Seite neu laden."); return; }
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    AlignmentType, WidthType, BorderStyle, ShadingType } = docx;

  const mv = getActiveMV(state);
  if (!mv) { alert("Kein Mietverhältnis aktiv."); return; }

  const objekt = getMVObjekt(state, mv);
  const einheit = getMVEinheit(state, mv);
  const vermieterList = getMVVermieter(state, mv);
  const { vertrag, personen: mieter } = mv;

  // Einheiten
  const mmDXA = (mm) => Math.round(mm * 56.7);
  const PW = 11906; const ML = mmDXA(22); const MR = mmDXA(22);
  const CW = PW - ML - MR; // ~9412
  const FONT = "EB Garamond"; const FONT_DISPLAY = "Cormorant Garamond"; const FONT_LABEL = "Jost"; const FS = 22; const IND = mmDXA(16);

  const fmtD = (v) => {
    if (!v) return "_______________";
    try { return new Date(v).toLocaleDateString("de-DE", { day: "2-digit", month: "long", year: "numeric" }); }
    catch { return v; }
  };
  const fmtE = (v) => {
    const n = parseFloat(String(v || "0").replace(",", "."));
    if (isNaN(n) || n === 0) return "____,__ €";
    const [i, d] = n.toFixed(2).split(".");
    return i.replace(/\B(?=(\d{3})+(?!\d))/g, ".") + "," + d + " €";
  };
  const fb = (v, pl = "_______________") => (v && String(v).trim()) ? String(v) : pl;

  const t = (text, opts = {}) => new TextRun({ text: String(text || ""), font: FONT, size: FS, ...opts });
  const gold = (text) => t(text, { color: "C4913A", bold: true });
  const bold = (text) => t(text, { bold: true });
  const sm = (text) => t(text, { color: "8A8377", size: 16, font: FONT_LABEL });
  const it = (text) => t(text, { italics: true, color: "8A8377", font: FONT_DISPLAY });

  const SP = { before: 60, after: 80, line: 280, lineRule: "auto" };
  const SP_SM = { before: 20, after: 40, line: 280, lineRule: "auto" };

  const para = (runs, opts = {}) => new Paragraph({
    children: Array.isArray(runs) ? runs : [t(runs)],
    spacing: SP, alignment: AlignmentType.JUSTIFIED, ...opts,
  });
  const paraInd = (runs, opts = {}) => para(
    Array.isArray(runs) ? runs : [t(runs)],
    { indent: { left: IND }, spacing: SP_SM, ...opts }
  );
  const emptyP = () => new Paragraph({ children: [t("")], spacing: { before: 0, after: 120 } });

  const NB = { style: BorderStyle.NONE, size: 0, color: "FFFFFF" };
  const NBS = { top: NB, bottom: NB, left: NB, right: NB };

  const secHead = (num, title) => new Paragraph({
    children: [new TextRun({ text: `§ ${num}  `, color: 'C4913A', bold: true, font: FONT_DISPLAY, size: 26 }), new TextRun({ text: title, bold: true, font: FONT_DISPLAY, size: 26 })],
    spacing: { before: 320, after: 100 },
    border: { bottom: { style: BorderStyle.SINGLE, size: 3, color: "D9A661", space: 2 } },
    keepNext: true,
  });

  const children = [];

  // ── BRIEFKOPF ── Nur Logo, keine Adresse (wie im Preview)
  const { ImageRun } = docx;
  const logoBytes = Uint8Array.from(atob(DOCX_LOGO_B64), c => c.charCodeAt(0));

  const headerBrd = { style: BorderStyle.NONE, size: 0, color: "FFFFFF" };
  const headerBrdBottom = { top: headerBrd, bottom: { style: BorderStyle.SINGLE, size: 6, color: "1A1714" }, left: headerBrd, right: headerBrd };

  children.push(new Table({
    width: { size: CW, type: WidthType.DXA },
    columnWidths: [CW],
    rows: [new TableRow({ children: [
      new TableCell({
        borders: headerBrdBottom,
        width: { size: CW, type: WidthType.DXA },
        margins: { top: 0, bottom: 60, left: 0, right: 0 },
        children: [new Paragraph({
          children: [new ImageRun({ data: logoBytes, transformation: { width: 95, height: 73 }, type: "png" })],
          spacing: { before: 0, after: 0 },
        })],
      }),
    ]})],
  }));
  children.push(emptyP());

  // ── TITEL ── Kein § 01-Label
  children.push(new Paragraph({
    children: [t(vertrag.typ === "moebliert" ? "Zeitmietvertrag" : "Mietvertrag", { size: 80, bold: false, font: FONT_DISPLAY })],
    spacing: { before: 0, after: 160 },
  }));
  const TYPEN = { staffel: "Mietvertrag mit Staffelmiete (§ 557a BGB)", index: "Mietvertrag mit Indexmiete (§ 557b BGB)", moebliert: "Zeitmietvertrag über möblierten Wohnraum (§ 575 BGB)" };
  children.push(new Paragraph({ children: [t(TYPEN[vertrag.typ] || "", { italics: true, color: "A8674F", font: FONT_DISPLAY })], spacing: { before: 0, after: 280 } }));

  // ── PARTEIEN ──
  children.push(para([bold("Zwischen")], { spacing: { before: 0, after: 80 } }));
  vermieterList.forEach((v, i) => {
    children.push(paraInd(fb(v.name)));
    children.push(paraInd(`${fb(v.anschrift)}, ${fb(v.plz_ort)}`));
    if (i < vermieterList.length - 1) children.push(paraInd([it("und")]));
  });
  children.push(para([it(`– nachfolgend „Vermieter" ${vermieterList.length > 1 ? "(gesamtschuldnerisch berechtigt) " : ""}–`)], { spacing: { before: 40, after: 160 } }));

  children.push(para([bold("und")], { spacing: { before: 0, after: 80 } }));
  mieter.forEach((m) => {
    const nameRuns = [t(fb(m.name))];
    if (m.geburtsdatum) nameRuns.push(t(`, geb. am ${fmtD(m.geburtsdatum)}`));
    children.push(paraInd(nameRuns));
    children.push(paraInd(fb(m.anschrift_alt)));
  });
  children.push(para([it(`– nachfolgend „Mieter" ${mieter.length > 1 ? "(gesamtschuldnerisch haftend) " : ""}–`)], { spacing: { before: 40, after: 160 } }));
  children.push(para("wird folgender Mietvertrag geschlossen:", { spacing: { before: 0, after: 280 } }));

  // ── § 1 MIETSACHE ──
  children.push(secHead(1, "Mietsache"));
  children.push(para([t("(1) Vermietet werden die im Haus "), bold(`${fb(objekt && objekt.adresse)}, ${fb(objekt && objekt.plz_ort)}`), t(` im ${fb(einheit && einheit.etage)}${einheit && einheit.lage ? ` (${einheit.lage})` : ""} gelegenen Räume:`)]));
  children.push(paraInd(`${fb(einheit && einheit.bezeichnung, "____")}, bestehend aus ${fb(einheit && einheit.zimmer, "____")} Zimmer${einheit && einheit.zimmer && parseFloat(einheit.zimmer) !== 1 ? "n" : ""}, Küche, Bad${einheit && einheit.nebenraeume ? `, ${einheit.nebenraeume}` : ""}.`));
  children.push(paraInd([t("Wohnfläche: ca. "), bold(`${fb(einheit && einheit.wohnflaeche)} m²`)]));
  children.push(para("(2) Die Wohnflächenangabe ist eine ungefähre Angabe und stellt keine Beschaffenheitsvereinbarung dar.", { spacing: SP_SM }));
  if (vertrag.typ === "moebliert") children.push(para([t("(3) Die Wohnung wird "), bold("möbliert"), t(" vermietet. Das mitvermietete Mobiliar ergibt sich aus dem Inventarverzeichnis (Anlage 1).")]));
  const uzNr = vertrag.typ === "moebliert" ? 4 : 3;
  children.push(para([t(`(${uzNr}) Die Wohnung wird im Zustand `), bold(vertrag.uebergabezustand || "renoviert"), t(" übergeben.")], { spacing: SP_SM }));

  // ── § 2 MIETZEIT ──
  children.push(secHead(2, "Mietzeit"));
  if (vertrag.typ === "moebliert") {
    children.push(para([t("(1) Das Mietverhältnis beginnt am "), bold(fmtD(vertrag.mietbeginn)), t(" und endet am "), bold(fmtD(vertrag.befristung_ende)), t(", ohne dass es einer Kündigung bedarf.")]));
    children.push(para(`(2) Die Befristung erfolgt gemäß § 575 Abs. 1 BGB aus folgendem Grund: ${fb(vertrag.befristung_grund)}`));
    if (vertrag.befristung_konkret) children.push(paraInd(`Konkret: ${vertrag.befristung_konkret}`));
    const vlTyp = vertrag.verlaengerung_typ || "fix";
    if (vlTyp === "fix") {
      children.push(para([t("(3) Sollte das Mietverhältnis nach Ablauf der Befristung verlängert oder gemäß § 575 Abs. 3 BGB fortgesetzt werden, gilt ab dem ersten Tag nach Befristungsende eine neue monatliche Nettokaltmiete von "), bold(fmtE(vertrag.verlaengerung_miete)), t(". Das Mietverhältnis wird als unbefristetes Mietverhältnis fortgeführt. Eine Verlängerung bedarf der Schriftform.")]));
    } else if (vlTyp === "index") {
      children.push(para([t("(3) Sollte das Mietverhältnis verlängert oder gemäß § 575 Abs. 3 BGB fortgesetzt werden, gilt ab dem ersten Tag nach Befristungsende eine neue Basismiete von "), bold(fmtE(vertrag.verlaengerung_miete)), t(` als Indexmiete gemäß § 557b BGB. Als Basisindex gilt der zum Verlängerungszeitpunkt aktuell veröffentlichte VPI für Deutschland (Basisjahr ${vertrag.index_basisjahr || "2020"} = 100). Das Mietverhältnis wird als unbefristetes Indexmietverhältnis fortgeführt. Eine Verlängerung bedarf der Schriftform.`)]));
    } else if (vlTyp === "staffel") {
      children.push(para([t("(3) Sollte das Mietverhältnis verlängert oder gemäß § 575 Abs. 3 BGB fortgesetzt werden, gilt ab dem ersten Tag nach Befristungsende die folgende Staffelmiete gemäß § 557a BGB:")]));
      if (vertrag.verlaengerung_staffeln && vertrag.verlaengerung_staffeln.length > 0) {
        const cw2 = Math.floor((CW - IND) / 2);
        const brd = { style: BorderStyle.SINGLE, size: 1, color: "CCCCCC" };
        const brds = { top: brd, bottom: brd, left: brd, right: brd };
        children.push(new Table({
          width: { size: CW - IND, type: WidthType.DXA }, columnWidths: [cw2, cw2],
          indent: { size: IND, type: WidthType.DXA },
          rows: [
            new TableRow({ children: [cw2, cw2].map((w, ci) => new TableCell({ borders: brds, width: { size: w, type: WidthType.DXA }, shading: { fill: "F5EDD8", type: ShadingType.CLEAR }, margins: { top: 80, bottom: 80, left: 120, right: 120 }, children: [new Paragraph({ children: [bold(ci === 0 ? "Ab" : "Nettokaltmiete")] })] })) }),
            ...vertrag.verlaengerung_staffeln.map(s => new TableRow({ children: [
              new TableCell({ borders: brds, width: { size: cw2, type: WidthType.DXA }, margins: { top: 80, bottom: 80, left: 120, right: 120 }, children: [new Paragraph({ children: [t(fmtD(s.datum))] })] }),
              new TableCell({ borders: brds, width: { size: cw2, type: WidthType.DXA }, margins: { top: 80, bottom: 80, left: 120, right: 120 }, children: [new Paragraph({ children: [bold(fmtE(s.betrag))] })] }),
            ]})),
          ],
        }));
      }
      children.push(para("Das Mietverhältnis wird als unbefristetes Staffelmietverhältnis fortgeführt. Eine Verlängerung bedarf der Schriftform."));
    }
    children.push(para("(4) Hinweis gemäß § 575 Abs. 3 BGB: Ist der Befristungsgrund zum Ablauftermin nicht eingetreten, kann der Mieter die Fortsetzung verlangen. In diesem Fall gilt Abs. 3 entsprechend.", { spacing: { ...SP_SM, before: 40 } }));

  children.push(para("(2) Unwirksame Bestimmungen werden durch die gesetzliche Regelung ersetzt."));
  children.push(para(`(3) Anlagen: Hausordnung · Belehrung Schönheitsreparaturen · DSGVO-Hinweis${vertrag.typ === "moebliert" ? " · Inventarliste" : ""}`));

  // ── UNTERSCHRIFTEN ──

      makeCell("", gapW, false),
      makeCell(i < mieter.length ? `Mieter${mieter.length > 1 ? ` ${i+1}` : ""}` : "", sigW, false),
    ]}));

// Datum-Helper für Fristen-Cockpit
const daysFromNow = (dateStr) => {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return Math.round((d - today) / (1000 * 60 * 60 * 24));
};
const addMonths = (dateStr, months) => {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  d.setMonth(d.getMonth() + months);
  return d.toISOString().slice(0, 10);
};

function FristenCockpit({ state, setState }) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const events = [];

  for (const mv of state.mietverhaeltnisse) {
    if (mv.status === "beendet") continue;
    const objekt = state.objekte.find((o) => o.id === mv.objekt_id);
    const einheit = objekt && objekt.einheiten.find((e) => e.id === mv.einheit_id);
    const mvLabel = `${mv.personen.map((p) => p.name).filter(Boolean).join(", ") || mv.bezeichnung || "—"} · ${objekt ? (objekt.name || objekt.adresse) : "?"}${einheit ? ` ${einheit.bezeichnung || ""}` : ""}`;
    const v = mv.vertrag;

    // Befristungsende (moebliert)
    if (v.typ === "moebliert" && v.befristung_ende) {
      const days = daysFromNow(v.befristung_ende);
      if (days !== null && days >= -30 && days <= 365) {
        events.push({ mvId: mv.id, mvLabel, datum: v.befristung_ende, tage: days, art: "befristung_ende", titel: "Befristung läuft aus", aktion: "Verlängerung verhandeln oder Auszug planen" });
      }
    }

    // Staffel-Erhöhungen
    if ((v.typ === "staffel" || (v.typ === "moebliert" && v.moebliert_anpassung === "staffel")) && Array.isArray(v.staffeln)) {
      v.staffeln.forEach((s, i) => {
        if (!s.datum) return;
        const days = daysFromNow(s.datum);
        if (days !== null && days >= -7 && days <= 180) {
          events.push({ mvId: mv.id, mvLabel, datum: s.datum, tage: days, art: "staffel", titel: `Staffel #${i + 1}: ${fmtEUR(s.betrag)}`, aktion: "Daueranweisung Mieter erinnern, Lastschrift anpassen" });
        }
      });
    }

    // Index-Sperre (12 Mon. ab Mietbeginn oder letzter Anpassung)
    if (v.typ === "index" || (v.typ === "moebliert" && v.moebliert_anpassung === "index")) {
      const letzteIdx = (mv.schreiben && mv.schreiben.mieterhoehung_index && mv.schreiben.mieterhoehung_index.wirksam_ab) || null;
      const anker = letzteIdx || v.mietbeginn;
      if (anker) {
        const naechstMoegl = addMonths(anker, 12);
        const days = daysFromNow(naechstMoegl);
        if (days !== null && days >= -30 && days <= 90) {
          events.push({ mvId: mv.id, mvLabel, datum: naechstMoegl, tage: days, art: "index_moeglich", titel: "Indexanpassung möglich", aktion: "Aktuellen VPI auf destatis.de prüfen, Erhöhungs­schreiben erstellen" });
        }
      }
    }

    // §558-Sperre (15 Mon. seit letzter Erhöhung)
    if (v.typ === "staffel") {
      // staffel hat §558 ausgeschlossen, also nicht
    } else if (v.typ !== "index" && v.typ !== "moebliert") {
      // Unbefristet ohne Anpassung: §558 möglich
      const letzte558 = (mv.schreiben && mv.schreiben.mieterhoehung_558 && mv.schreiben.mieterhoehung_558.wirksam_ab) || null;
      const anker = letzte558 || v.mietbeginn;
      if (anker) {
        const naechstMoegl = addMonths(anker, 15);
        const days = daysFromNow(naechstMoegl);
        if (days !== null && days >= -60 && days <= 120) {
          events.push({ mvId: mv.id, mvLabel, datum: naechstMoegl, tage: days, art: "558_moeglich", titel: "§ 558 Mieterhöhung möglich", aktion: "Mietspiegel prüfen, Erhöhungs­schreiben verfassen (max. 20 % in 3 Jahren)" });
        }
      }
    }

    // Offene Mahnung mit Zahlungsfrist
    const ma = mv.schreiben && mv.schreiben.mahnung;
    if (ma && ma.zahlungsfrist) {
      const days = daysFromNow(ma.zahlungsfrist);
      if (days !== null && days >= -30 && days <= 60) {
        const stufeName = { "1": "Zahlungserinnerung", "2": "2. Mahnung", "3": "Letzte Mahnung" }[ma.stufe] || "Mahnung";
        events.push({ mvId: mv.id, mvLabel, datum: ma.zahlungsfrist, tage: days, art: "mahnung_frist", titel: `${stufeName}: Zahlungsfrist`, aktion: days < 0 ? "Frist abgelaufen – nächste Stufe oder fristlose Kündigung prüfen" : "Zahlungseingang prüfen, Eskalation vorbereiten" });
      }
    }

    // BKA-Frist (12 Monate nach Ablauf Kalenderjahr)
    if (v.mietbeginn) {
      const heute = new Date();
      const aktuellesJahr = heute.getFullYear();
      const letztesJahr = aktuellesJahr - 1;
      const bkaFrist = `${aktuellesJahr}-12-31`; // BKA für letztesJahr muss bis Ende dieses Jahres raus
      const days = daysFromNow(bkaFrist);
      if (days !== null && days >= 0 && days <= 120 && mv.status === "aktiv") {
        events.push({ mvId: mv.id, mvLabel, datum: bkaFrist, tage: days, art: "bka_frist", titel: `Betriebskostenabrechnung ${letztesJahr}`, aktion: `BKA ${letztesJahr} an Mieter senden (Frist § 556 III BGB: Ende ${aktuellesJahr})` });
      }
    }
  }

  events.sort((a, b) => a.tage - b.tage);

  const colorByTage = (tage) => {
    if (tage < 0) return { bg: "bg-red-100 border-red-300", txt: "text-red-900", label: `${Math.abs(tage)} Tage überfällig` };
    if (tage <= 30) return { bg: "bg-red-50 border-red-200", txt: "text-red-800", label: `in ${tage} Tagen` };
    if (tage <= 90) return { bg: "bg-amber-50 border-amber-200", txt: "text-amber-800", label: `in ${tage} Tagen` };
    return { bg: "bg-emerald-50 border-emerald-200", txt: "text-emerald-800", label: `in ${tage} Tagen` };
  };

  const setActiveMV = (id) => setState((s) => ({ ...s, aktuellesMVId: id }));

  return (
    <div className="space-y-4">
      <InfoBox variant="info">Übersicht über alle Fristen aus deinen Mietverhältnissen. Rot = überfällig oder in ≤ 30 Tagen, Gelb = in 31–90 Tagen, Grün = mehr Zeit. Klick auf eine Karte aktiviert das Mietverhältnis und du kannst direkt zum entsprechenden Tab wechseln.</InfoBox>
      {events.length === 0 && (
        <p className="text-sm text-stone-500 italic p-6 text-center">Keine offenen Fristen in den nächsten 90 Tagen. Wenn das überrascht: Mietbeginn-Datum bei allen Mietverhältnissen prüfen.</p>
      )}
      {events.map((ev, i) => {
        const c = colorByTage(ev.tage);
        return (
          <div key={i} className={`p-3 border rounded-lg ${c.bg} cursor-pointer hover:shadow-sm transition`} onClick={() => setActiveMV(ev.mvId)}>
            <div className="flex items-start justify-between gap-2 mb-1">
              <div className="flex-1">
                <div className="flex items-center gap-2 mb-0.5">
                  <span className={`text-[10px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded bg-white ${c.txt}`}>{c.label}</span>
                  <span className="text-xs text-stone-500">{fmtDateShort(ev.datum)}</span>
                </div>
                <div className={`text-sm font-semibold ${c.txt}`}>{ev.titel}</div>
                <div className="text-xs text-stone-700 mt-0.5">{ev.mvLabel}</div>
                <div className="text-xs text-stone-600 mt-1 italic">→ {ev.aktion}</div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

async function exportCurrentDocx(state, previewDoc) {
  if (typeof docx === "undefined") { alert("DOCX-Library nicht verfügbar."); return; }
  if (previewDoc === "vertrag") { await exportDocx(state); return; }

  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    AlignmentType, WidthType, BorderStyle, ShadingType } = docx;

  const mv = getActiveMV(state);
  if (!mv && !["hausordnung","belehrung","dsgvo","selbstauskunft"].includes(previewDoc)) {
    alert("Kein Mietverhältnis aktiv."); return;
  }

  const objekt = mv && getMVObjekt(state, mv);
  const einheit = mv && getMVEinheit(state, mv);
  const vermieterList = mv ? getMVVermieter(state, mv) : state.vermieter;

  const mmDXA = (mm) => Math.round(mm * 56.7);
  const CW = 11906 - mmDXA(22) - mmDXA(22);
  const FONT = "EB Garamond"; const FONT_D = "Cormorant Garamond"; const FONT_L = "Jost";

      children.push(new Paragraph({ children: [bold("Mieterhöhungsverlangen § 558 BGB – Wohnung " + fb(einheit?.bezeichnung, ""))], spacing: { before: 0, after: 160 } }));

      children.push(para([t("auf Grundlage des § 558 BGB bitten wir um Zustimmung zur Erhöhung der Nettokaltmiete von "), bold(fmtE(mv.vertrag.grundmiete)), t(" auf "), bold(fmtE(e2.neue_miete)), t(" ab "), bold(fmtD(e2.wirksam_ab)), t(".")]));
      if (e2.begruendung) { children.push(h3("", "Begründung")); children.push(para(e2.begruendung)); }
      children.push(emptyP()); children.push(para("Wir bitten um schriftliche Zustimmung bis zum Ablauf des zweiten Kalendermonats nach Zugang (§ 558b Abs. 2 BGB)."));
    }

    else if (previewDoc === "modernisierung") {
      const mo = s.modernisierung || {}; filename = "Modernisierungsumlage-" + (mv.personen[0]?.name?.split(" ").pop() || "Mieter");
      const kosten = parseFloat(mo.kosten_brutto || "0"); const erh = parseFloat(mo.erhaltungsanteil || "0"); const dri = parseFloat(mo.drittmittel || "0");
      const umlage = Math.max(0, kosten - erh - dri); const monatlich = (umlage * 0.08) / 12;
      children.push(new Paragraph({ children: [t(fmtD(mo.datum_heute), { color: "8A8377", size: 14, font: FONT_L })], alignment: AlignmentType.RIGHT, spacing: { before: 0, after: 200 } }));
      children.push(new Paragraph({ children: [bold("Mieterhöhung Modernisierung § 559 BGB – Wohnung " + fb(einheit?.bezeichnung, ""))], spacing: { before: 0, after: 160 } }));
      children.push(para(getAnrede(mv.personen)));
      children.push(para("folgende Modernisierungsmaßnahmen wurden durchgeführt: " + fb(mo.art)));
      if (mo.detail) children.push(paraInd(mo.detail));
      children.push(emptyP());
      children.push(buildTable(["Position", "Betrag"], [["Gesamtkosten brutto", fmtE(mo.kosten_brutto)], ["./. Erhaltungsanteil", fmtE(mo.erhaltungsanteil)], ["./. Drittmittel", fmtE(mo.drittmittel)], ["Umlagefähig", fmtE(umlage)], ["× 8% ÷ 12 = monatlich", fmtE(monatlich)], ["Neue Nettokaltmiete", fmtE(parseFloat(mv.vertrag.grundmiete||"0") + monatlich)]], [65, 35]));
      children.push(emptyP()); children.push(para([t("Wirksam ab: "), bold(fmtD(mo.wirksam_ab))]));
    }

    else if (previewDoc === "kautionsabrechnung") {
      const ka = mv.kautionsabrechnung || {}; filename = "Kautionsabrechnung-" + (mv.personen[0]?.name?.split(" ").pop() || "Mieter");
      const eingezahlt = parseFloat(ka.kaution_eingezahlt || mv.vertrag.kaution || "0"); const zinsen = parseFloat(ka.zinsen || "0");
      const offMiete = parseFloat(ka.offene_mieten || "0"); const schaden = parseFloat(ka.schadensersatz || "0"); const bka = parseFloat(ka.einbehalt_bka || "0");
      const auszahlung = eingezahlt + zinsen - offMiete - schaden - bka;
      children.push(new Paragraph({ children: [t(fmtD(ka.datum_heute), { color: "8A8377", size: 14, font: FONT_L })], alignment: AlignmentType.RIGHT, spacing: { before: 0, after: 200 } }));
      children.push(new Paragraph({ children: [bold("Kautionsabrechnung – Mietende " + fmtD((mv.auszug || {}).datum))], spacing: { before: 0, after: 160 } }));
      children.push(para(getAnrede(mv.personen)));
      children.push(para("im Anschluss an Ihren Auszug erhalten Sie die Abrechnung Ihrer Mietkaution:"));
      children.push(emptyP());
      const rows = [["Eingezahlte Kaution", fmtE(eingezahlt)], ["Aufgelaufene Zinsen", fmtE(zinsen)]];
      if (offMiete > 0) rows.push(["./. Offene Mieten", "– " + fmtE(offMiete)]);
      if (schaden > 0) rows.push(["./. Schadensersatz", "– " + fmtE(schaden)]);
      if (bka > 0) rows.push(["./. Einbehalt BKA", "– " + fmtE(bka)]);
      rows.push([auszahlung >= 0 ? "Auszahlung an Mieter" : "Nachforderung", fmtE(Math.abs(auszahlung))]);
      children.push(buildTable(["Position", "Betrag"], rows, [65, 35]));
      if (auszahlung > 0 && ka.auszahlung_iban) { children.push(emptyP()); children.push(para("Überweisung an: " + fb(ka.auszahlung_an_name) + " · IBAN: " + fb(ka.auszahlung_iban))); }
    }

    children.push(emptyP());
    children.push(new Paragraph({ children: [t("Mit freundlichen Grüßen")], spacing: { before: 280, after: 440 } }));
    vermieterList.forEach(v => { children.push(new Paragraph({ children: [t("______________________________")], spacing: { before: 0, after: 0 } })); children.push(new Paragraph({ children: [sm(v.name)], spacing: { before: 20, after: 160 } })); });
  }

  const doc = new Document({ styles: docStyles, sections: docSections });
  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename + "-" + new Date().toISOString().slice(0,10) + ".docx"; a.click();
  URL.revokeObjectURL(url);
}


const TABS = [
  { id: "stamm", label: "Stammdaten", icon: "user" },
  { id: "mieter", label: "Mietverhältnisse", icon: "users" },
  { id: "fristen", label: "Fristen", icon: "calendar" },
  { id: "vertrag", label: "Vertrag", icon: "fileText" },
  { id: "uebergabe", label: "Übergabe", icon: "clipboard" },
  { id: "hausordnung", label: "Hausordnung", icon: "scroll" },
  { id: "anlagen", label: "Anlagen", icon: "shield" },
  { id: "schreiben", label: "Schreiben", icon: "bell" },
];

const DOC_PREVIEWS = {
  vertrag: MietvertragPreview,
  uebergabe: UebergabeprotokollPreview,
  auszugsprotokoll: AuszugsprotokollPreview,
  hausordnung: HausordnungPreview,
  belehrung: BelehrungPreview,
  dsgvo: DSGVOPreview,
  inventar: InventarPreview,
  selbstauskunft: SelbstauskunftPreview,
  mahnung: MahnungPreview,
  mieterhoehung: MieterhoehungIndexPreview,
  mieterhoehung558: MieterhoehungVergleichsmietePreview,
  modernisierung: ModernisierungPreview,
  kautionsabrechnung: KautionsabrechnungPreview,
};

function App() {
  const [state, setState, saveStatus, loaded] = useLocalStorage();
  const [tab, setTab] = useState("stamm");
  const [previewDoc, setPreviewDoc] = useState("vertrag");
  const fileInputRef = useRef(null);

  useEffect(() => {
    if (tab === "vertrag") setPreviewDoc("vertrag");
    else if (tab === "uebergabe") setPreviewDoc((p) => ["uebergabe","auszugsprotokoll"].includes(p) ? p : "uebergabe");
    else if (tab === "hausordnung") setPreviewDoc("hausordnung");
    else if (tab === "anlagen") setPreviewDoc((p) => ["belehrung","dsgvo","inventar","selbstauskunft"].includes(p) ? p : "belehrung");
    else if (tab === "schreiben") setPreviewDoc((p) => ["mahnung","mieterhoehung","mieterhoehung558","modernisierung","kautionsabrechnung"].includes(p) ? p : "mahnung");
  }, [tab]);

  if (!loaded) {
    return <div className="min-h-screen flex items-center justify-center bg-stone-100"><div className="text-stone-600 text-sm">Lädt …</div></div>;
  }

  // Aktiviert temporär eine Liste von Wrapper-IDs, druckt, stellt vorigen Zustand wieder her.
  const printDocs = (docKeys) => {
    const wrappers = docKeys
      .map((k) => document.getElementById(`preview-wrapper-${k}`))
      .filter(Boolean);
    if (wrappers.length === 0) return;
    const previouslyActive = Array.from(document.querySelectorAll(".screen-only-wrapper.active"));
    previouslyActive.forEach((el) => el.classList.remove("active"));
    wrappers.forEach((el, i) => {
      el.classList.add("active");
      if (i === wrappers.length - 1) el.classList.add("last-wrapper");
    });
    // Safari: inline maxHeight vom scroll-container entfernen damit alles gedruckt wird
    const printArea = document.querySelector(".print-area");
    const oldMaxHeight = printArea ? printArea.style.maxHeight : "";
    const oldOverflow = printArea ? printArea.style.overflow : "";
    if (printArea) {
      printArea.style.maxHeight = "none";
      printArea.style.overflow = "visible";
    }
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        window.print();
        setTimeout(() => {
          // Alles wiederherstellen
          if (printArea) {
            printArea.style.maxHeight = oldMaxHeight;
            printArea.style.overflow = oldOverflow;
          }
          wrappers.forEach((el) => {
            el.classList.remove("active");
            el.classList.remove("last-wrapper");
          });
          previouslyActive.forEach((el) => el.classList.add("active"));
        }, 300);
      });
    });
  };

  const handlePrint = () => printDocs([previewDoc]);

  const handlePrintMappe = () => {
    const mv = getActiveMV(state);
    const docs = ["vertrag", "uebergabe", "hausordnung", "belehrung", "dsgvo"];
    if (mv && mv.vertrag.typ === "moebliert") docs.push("inventar");
    printDocs(docs);
  };

  const handleImport = (file) => {
    if (!file) return;
    if (!confirm("Bestehende Daten werden überschrieben. Vorher Backup exportiert? Fortfahren?")) return;
    importJSON(file, (newState) => {
      setState(newState);
      alert("Daten erfolgreich importiert.");
    });
  };

  const handleReset = () => {
    if (!confirm("ALLE Daten unwiderruflich löschen und neu starten? Vorher unbedingt Backup exportieren!")) return;
    if (!confirm("Wirklich sicher? Alle Stammdaten, Objekte, Mietverhältnisse, Verträge gehen verloren.")) return;
    setState(DEFAULT_STATE);
  };

  const PreviewComp = DOC_PREVIEWS[previewDoc] || MietvertragPreview;

  return (
    <div className="min-h-screen bg-stone-100">
      <header className="no-print bg-bone border-b border-ink/10 sticky top-0 z-10">
        <div className="px-8 py-4 flex items-center justify-between gap-4">
          <GlowLogo width={200} height={153} />
          <div className="flex items-center gap-2">
            {saveStatus === "saving" && <span className="font-label text-[10px] tracking-[0.24em] uppercase text-smoke">Speichert</span>}
            {saveStatus === "saved" && <span className="font-label text-[10px] tracking-[0.24em] uppercase text-moss flex items-center gap-1"><Icon name="check" size={11} /> Gespeichert</span>}
            {saveStatus === "error" && <span className="font-label text-[10px] tracking-[0.24em] uppercase text-clay">Fehler</span>}
            <Btn variant="ghost" size="sm" icon="download" onClick={() => exportJSON(state)}>Export</Btn>
            <Btn variant="ghost" size="sm" icon="upload" onClick={() => fileInputRef.current.click()}>Import</Btn>
            <input ref={fileInputRef} type="file" accept=".json,application/json" style={{display:"none"}} onChange={(e) => { handleImport(e.target.files[0]); e.target.value = ""; }} />
            <Btn variant="ghost" size="sm" onClick={handleReset} className="!text-clay hover:!bg-clay/10">Reset</Btn>
          </div>
        </div>
        <nav className="px-8 flex gap-0 border-t border-ink/10 overflow-x-auto">
          {TABS.map((t) => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`flex items-center gap-2 px-4 py-3 font-label text-[10px] tracking-[0.22em] uppercase border-b-2 transition whitespace-nowrap ${tab === t.id ? "border-ember text-ink" : "border-transparent text-smoke hover:text-ink-mid"}`}>
              <Icon name={t.icon} size={12} />{t.label}
            </button>
          ))}
        </nav>
      </header>

      <div className="grid grid-cols-1 lg:grid-cols-[480px_1fr] gap-0">
        <div className="no-print bg-linen border-r border-ink/10 p-8 overflow-y-auto" style={{ maxHeight: "calc(100vh - 100px)" }}>
          {tab === "stamm" && <StammdatenForm state={state} setState={setState} />}
          {tab === "mieter" && <MietverhaeltnisListe state={state} setState={setState} />}
          {tab === "fristen" && <FristenCockpit state={state} setState={setState} />}
          {tab === "vertrag" && <VertragForm state={state} setState={setState} />}
          {tab === "uebergabe" && <UebergabeForm state={state} setState={setState} previewDoc={previewDoc} setPreviewDoc={setPreviewDoc} />}
          {tab === "hausordnung" && <HausordnungForm state={state} setState={setState} />}
          {tab === "anlagen" && <AnlagenForm state={state} setState={setState} previewDoc={previewDoc} setPreviewDoc={setPreviewDoc} />}
          {tab === "schreiben" && <SchreibenForm state={state} setState={setState} previewDoc={previewDoc} setPreviewDoc={setPreviewDoc} />}
          <div className="mt-10 pt-6 border-t border-ink/10">
            <InfoBox variant="legal"><strong className="font-label text-[10px] tracking-[0.22em] uppercase">Rechtshinweis</strong><br/>Dieses Werkzeug erstellt marktübliche Mietvertragsvorlagen. Es ersetzt keine anwaltliche Beratung. Lass die Vorlage einmal von einem Fachanwalt für Mietrecht oder Haus &amp; Grund prüfen, insbesondere die Klausel zu Schönheitsreparaturen.</InfoBox>
          </div>
        </div>
        <div className="bg-paper overflow-y-auto print-area" style={{ maxHeight: "calc(100vh - 100px)" }}>
          <div className="no-print sticky top-0 z-10 bg-paper/95 backdrop-blur border-b border-ink/10 px-8 py-3 flex items-center justify-between gap-3">
            <div className="flex items-center gap-3">
              <span className="font-label text-[10px] tracking-[0.24em] uppercase text-smoke">Vorschau</span>
              <Select value={previewDoc} onChange={(e) => setPreviewDoc(e.target.value)} className="!w-auto">
                <option value="vertrag">Mietvertrag</option>
                <option value="uebergabe">Übergabeprotokoll (Einzug)</option>
                <option value="auszugsprotokoll">Auszugsprotokoll (Rückgabe)</option>
                <option value="hausordnung">Hausordnung</option>
                <option value="belehrung">Anlage: Belehrung Schönheitsreparaturen</option>
                <option value="dsgvo">Anlage: DSGVO-Hinweis</option>
                <option value="inventar">Anlage: Inventarliste</option>
                <option value="selbstauskunft">Selbstauskunft (vor Vertrag)</option>
                <option value="mahnung">Schreiben: Mahnung</option>
                <option value="mieterhoehung">Schreiben: Mieterhöhung Index</option>
                <option value="mieterhoehung558">Schreiben: Mieterhöhung § 558</option>
                <option value="modernisierung">Schreiben: Modernisierung § 559</option>
                <option value="kautionsabrechnung">Schreiben: Kautionsabrechnung</option>
              </Select>
            </div>
            <div className="flex items-center gap-2">
              <Btn variant="secondary" icon="printer" onClick={handlePrintMappe} size="sm">Vertragsmappe</Btn>
              <Btn variant="secondary" icon="printer" onClick={handlePrint} size="sm">Drucken</Btn>
              <Btn variant="accent" size="sm" icon="fileText" onClick={() => exportCurrentDocx(state, previewDoc)}>DOCX</Btn>
            </div>
          </div>
          <div className="px-4 pb-12">
            {/* Alle Dokumente immer im DOM – CSS-Klasse steuert Sichtbarkeit (kein inline style!) */}
            {Object.entries(DOC_PREVIEWS).map(([key, Comp]) => (
              <div key={key} id={`preview-wrapper-${key}`}
                className={`screen-only-wrapper${previewDoc === key ? " active" : ""}`}>
                <Comp state={state} />
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
