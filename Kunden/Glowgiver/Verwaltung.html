<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Giver · Verwaltung</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bone: '#F3ECDD', linen: '#FAF5EA', paper: '#EDE5D2',
        ember: '#D9A661', 'ember-deep': '#C4913A',
        clay: '#A8674F', oak: '#8E6A40',
        ink: '#1A1714', 'ink-mid': '#2A2520',
        smoke: '#8A8377', 'smoke-light': '#C4BDB4',
        moss: '#6E7253',
      },
      fontFamily: {
        display: ['"Cormorant Garamond"', 'serif'],
        body: ['"EB Garamond"', 'Georgia', 'serif'],
        label: ['Jost', 'system-ui', 'sans-serif'],
      },
    },
  },
};
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body { font-family: 'EB Garamond', Georgia, serif; background: #F3ECDD; color: #1A1714; }
  .print-page { font-family: 'EB Garamond', Georgia, serif; }
  .font-display { font-family: 'Cormorant Garamond', serif; }
  .font-label { font-family: 'Jost', system-ui, sans-serif; }
  /* Logo SVG color tokens */
  .glow-logo svg { width: 100%; height: auto; display: block; }
  .glow-logo.on-ink { --lg-ink: #F3ECDD; }
  /* Wrapper-Sichtbarkeit: aktiv = sichtbar, sonst versteckt. Gilt für Bildschirm UND Druck. */
  .screen-only-wrapper { display: none; }
  .screen-only-wrapper.active { display: block; }
  /* Kein trailing page-break nach dem letzten Dokument */
  .screen-only-wrapper.last-wrapper .print-page:last-child {
    page-break-after: auto !important;
    break-after: auto !important;
  }
  @media print {
    @page { size: A4; margin: 0; margin-top: 0; margin-bottom: 0; }
    html, body { background: white !important; }
    .no-print, .no-print * { display: none !important; }
    .print-area { display: block !important; max-height: none !important; overflow: visible !important; }
    /* Safari: scrollbare Container im Druck freigeben */
    .print-area > div { max-height: none !important; overflow: visible !important; height: auto !important; }
    .screen-only-wrapper { max-height: none !important; overflow: visible !important; height: auto !important; }
    .print-page {
      box-shadow: none !important;
      margin: 0 !important;
      page-break-after: always;
      break-after: page;
      width: 210mm !important;
      min-height: 297mm !important;
      background: white !important;
    }
    .print-page:last-child {
      page-break-after: auto;
      break-after: auto;
    }
  }
</style>

const DEFAULT_BELEHRUNG = `1. Was sind Schönheitsreparaturen?
Schönheitsreparaturen umfassen ausschließlich kosmetische Arbeiten, die durch den Gebrauch der Wohnung entstandene Spuren beseitigen. Dazu gehören gemäß § 28 Abs. 4 S. 5 II. BV insbesondere: Tapezieren, Anstreichen oder Kalken der Wände und Decken; Streichen der Fußböden; Streichen der Heizkörper einschließlich Heizrohre; Streichen der Innentüren sowie der Fenster und Außentüren von innen.

Nicht zu den Schönheitsreparaturen gehören: Streichen der Außenseiten von Fenstern und Türen, Lackieren der Parkettböden, Beseitigung von Substanzschäden, Erneuerung von Bodenbelägen, Arbeiten an der Heizungs- und Elektroanlage.

2. Wann müssen Schönheitsreparaturen ausgeführt werden?
Sofern im Mietvertrag eine wirksame Übertragung der Schönheitsreparaturen vereinbart ist, sind diese nach tatsächlicher Erforderlichkeit auszuführen. Starre Renovierungsfristen sind nach ständiger BGH-Rechtsprechung unwirksam (BGH VIII ZR 277/16).

Bei Übergabe in unrenoviertem Zustand ohne angemessenen finanziellen Ausgleich kann der Vermieter den Mieter nicht zur Durchführung von Schönheitsreparaturen verpflichten (BGH VIII ZR 185/14).

3. Wie sind die Arbeiten auszuführen?
Schönheitsreparaturen müssen in fachgerechter Art und mittlerer Güte ausgeführt werden. Bei Vertragsende ist die Wohnung in neutralen, hellen Farbtönen zurückzugeben, sofern eine eigene farbliche Gestaltung erfolgt ist.

4. Kleinreparaturen
Kleinreparaturen sind Reparaturen an Gegenständen, die dem direkten und häufigen Zugriff des Mieters unterliegen, etwa: Wasserhähne und Mischbatterien; Verschlüsse von Fenstern und Türen; Lichtschalter, Steckdosen; Rollläden- und Jalousiengurte; Heizungsventile.

Sofern im Mietvertrag eine wirksame Kleinreparaturklausel vereinbart ist, trägt der Mieter die Kosten bis zu der im Vertrag vereinbarten Grenze im Einzelfall und maximal bis zu dem dort genannten Jahresanteil.

5. Substanzschäden und Instandhaltung
Substanzschäden (z. B. defekte Heizung, Wasserrohrbruch, Schimmel aufgrund baulicher Mängel, defekte Elektroleitungen) sind grundsätzlich vom Vermieter zu beseitigen. Bitte melden Sie solche Mängel unverzüglich schriftlich beim Vermieter, damit Folgeschäden vermieden werden können.`;

function migrate(loaded) {
  if (!loaded) return DEFAULT_STATE;
  if (loaded.version === STATE_VERSION) return loaded;
  const s = JSON.parse(JSON.stringify(DEFAULT_STATE));
  if (Array.isArray(loaded.vermieter)) {
    s.vermieter = loaded.vermieter.map((v, i) => ({ ...v, id: v.id || `vm_${i}_${Date.now()}` }));
  }
  s.objekte = (loaded.objekte || []).map((o) => ({
    id: o.id || `obj_${Date.now()}_${Math.random()}`,
    name: o.name || "", adresse: o.adresse || "", plz_ort: o.plz_ort || "",
    baujahr: o.baujahr || "", heizungsart: o.heizungsart || "", energieklasse: o.energieklasse || "",
    vermieter_ids: o.vermieter_ids || s.vermieter.map((v) => v.id),
    iban: o.iban || "", bank: o.bank || "", kontoinhaber: o.kontoinhaber || "",
    einheiten: o.einheiten || [],
  }));
  if (Array.isArray(loaded.mietverhaeltnisse) && loaded.mietverhaeltnisse.length) {
    s.mietverhaeltnisse = loaded.mietverhaeltnisse.map((mv) => ({ ...newMietverhaeltnis(), ...mv }));
    s.aktuellesMVId = loaded.aktuellesMVId || s.mietverhaeltnisse[0].id;
  }
  if (loaded.hausordnung && loaded.hausordnung.paragraphen) s.hausordnung = loaded.hausordnung;
  s.belehrung_custom = loaded.belehrung_custom != null ? loaded.belehrung_custom : null;
  s.dsgvo_custom = loaded.dsgvo_custom != null ? loaded.dsgvo_custom : null;
  return s;
}

const fmtEUR = (v) => {
  const n = parseFloat(String(v).replace(",", "."));
  if (isNaN(n)) return "____ €";
  // Manuelles Format statt toLocaleString (Safari PDF-Layer-Bug mit toLocaleString)
  const fixed = n.toFixed(2);
  const [int, dec] = fixed.split(".");
  const intFormatted = int.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  return `${intFormatted},${dec} €`;
};
const fmtDate = (v) => {
  if (!v) return <span style={{ display: "inline-block", minWidth: "80pt", borderBottom: "0.5pt solid #1A1714", verticalAlign: "bottom" }}>&nbsp;</span>;
  try { return new Date(v).toLocaleDateString("de-DE", { day: "2-digit", month: "long", year: "numeric" }); }
  catch { return v; }
};
const fmtDateShort = (v) => {
  if (!v) return "—";
  try { return new Date(v).toLocaleDateString("de-DE"); } catch { return v; }
};
const Blank = ({ width = "80pt" }) => (
  <span style={{ display: "inline-block", minWidth: width, borderBottom: "0.5pt solid #1A1714", verticalAlign: "bottom" }}>&nbsp;</span>
);
const fallback = (v, p) => {
  if (v && String(v).trim()) return v;
  if (p !== undefined) return p;
  return <Blank />;
};

const getActiveMV = (state) => state.mietverhaeltnisse.find((mv) => mv.id === state.aktuellesMVId) || null;
const getMVObjekt = (state, mv) => mv && state.objekte.find((o) => o.id === mv.objekt_id);
const getMVEinheit = (state, mv) => {
  const obj = getMVObjekt(state, mv);
  return obj && obj.einheiten.find((e) => e.id === mv.einheit_id);
};
const getMVVermieter = (state, mv) => {
  const obj = getMVObjekt(state, mv);
  if (!obj) return state.vermieter;
  return state.vermieter.filter((v) => obj.vermieter_ids.includes(v.id));
};

// Personalisierte Anrede für Briefe (Mahnung etc.)
const getAnrede = (personen) => {
  const named = personen.filter((p) => p.name && p.name.trim());
  if (named.length === 1) {
    const n = named[0].name.trim();
    if (/^Frau\s+\S/i.test(n)) return `Sehr geehrte ${n},`;
    if (/^Herr\s+\S/i.test(n)) return `Sehr geehrter ${n},`;
  }
  if (named.length >= 2) {
    const allFormal = named.every((p) => /^(Frau|Herr)\s+\S/i.test(p.name.trim()));
    if (allFormal) {
      return named.map((p, i) => {
        const n = p.name.trim();
        const prefix = i === 0 ? "Sehr geehrte" : "sehr geehrte";
        const article = /^Herr\s/i.test(n) ? "r" : "";
        return `${prefix}${article} ${n}`;
      }).join(", ") + ",";
    }
  }
  return "Sehr geehrte Damen und Herren,";
};

// Zählernummer aus Einheit als Fallback wenn in Übergabe leer
const zaehlerNr = (mv, einheit, feld) => {
  if (mv.uebergabe[feld] && mv.uebergabe[feld].trim()) return mv.uebergabe[feld];
  if (einheit && einheit[feld]) return einheit[feld];
  return "";
};

const STORAGE_KEY = "mietvertrags-werkzeug:v1";

function useLocalStorage() {
  const [state, setState] = useState(DEFAULT_STATE);
  const [loaded, setLoaded] = useState(false);
  const [saveStatus, setSaveStatus] = useState("idle");
  const debounceRef = useRef(null);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setState(migrate(JSON.parse(raw)));
    } catch (e) {}
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    setSaveStatus("saving");
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        setSaveStatus("saved");
        setTimeout(() => setSaveStatus("idle"), 1500);
      } catch (e) { setSaveStatus("error"); }
    }, 500);
  }, [state, loaded]);

  return [state, setState, saveStatus, loaded];
}

function exportJSON(state) {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `mietvertrags-werkzeug-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(file, onLoad) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try { onLoad(migrate(JSON.parse(e.target.result))); }
    catch (err) { alert("Fehler beim Lesen: " + err.message); }
  };
  reader.readAsText(file);
}

          </SubText>

            (4) Hinweis gemäß § 575 Abs. 3 BGB: Ist der Befristungsgrund zum Ablauftermin nicht eingetreten, kann der Mieter die Fortsetzung des Mietverhältnisses verlangen. In diesem Fall gilt Abs. 3 entsprechend.
          </SubText>
        </>
      ) : (
        <SubText>Das Mietverhältnis beginnt am <strong>{fmtDate(vertrag.mietbeginn)}</strong> und läuft auf <strong>unbestimmte Zeit</strong>.</SubText>
      )}

      <ParagraphHeader nummer="3" titel="Miete" />
      {vertrag.typ === "staffel" && (
        <>
          <SubText>(1) Die monatliche Nettokaltmiete beträgt bei Mietbeginn <strong>{fmtEUR(vertrag.grundmiete)}</strong>.</SubText>
          <SubText>(2) Die Miete erhöht sich gemäß § 557a BGB wie folgt:</SubText>
          {vertrag.staffeln && vertrag.staffeln.length > 0 ? (
            <table style={{ width: "100%", borderCollapse: "collapse", marginLeft: "20pt", marginTop: "4pt", fontSize: "10.5pt" }}>
              <thead><tr style={{ borderBottom: "0.5pt solid #1A1714" }}><th style={{ textAlign: "left", padding: "3pt 0", width: "40%" }}>ab</th><th style={{ textAlign: "left", padding: "3pt 0" }}>neue Nettokaltmiete</th></tr></thead>
              <tbody>{vertrag.staffeln.map((s, i) => (<tr key={i}><td style={{ padding: "3pt 0" }}>{fmtDate(s.datum)}</td><td style={{ padding: "3pt 0", fontWeight: 600 }}>{fmtEUR(s.betrag)}</td></tr>))}</tbody>
            </table>
          ) : <SubText style={{ marginLeft: "20pt", color: "#8A8377" }}>– noch keine Staffeln eingetragen –</SubText>}
          <SubText style={{ fontSize: "9.5pt", color: "#8A8377" }}>(3) Mieterhöhungen nach §§ 558 bis 559b BGB sind während der Geltung der Staffelmiete ausgeschlossen.</SubText>
        </>
      )}
      {vertrag.typ === "index" && (
        <>
          <SubText>(1) Die monatliche Nettokaltmiete beträgt <strong>{fmtEUR(vertrag.grundmiete)}</strong>.</SubText>
          <SubText>(2) Die Miete wird gemäß § 557b BGB durch den vom Statistischen Bundesamt ermittelten <strong>Verbraucherpreisindex für Deutschland</strong> (Basisjahr {vertrag.index_basisjahr} = 100) bestimmt.</SubText>
          {vertrag.index_basiswert && <SubText style={{ marginLeft: "20pt" }}>Der Indexstand bei Vertragsabschluss beträgt <strong>{vertrag.index_basiswert}</strong> (Stand: {vertrag.index_basismonat || "____"}).</SubText>}
          <SubText>(3) Eine Änderung der Miete kann frühestens 12 Monate nach Beginn des Mietverhältnisses oder der letzten Mietanpassung verlangt werden. Die Mietänderung ist durch Erklärung in Textform geltend zu machen.</SubText>
          <SubText style={{ fontSize: "9.5pt", color: "#8A8377" }}>(4) Mieterhöhungen nach §§ 558 bis 559 BGB sind ausgeschlossen, mit Ausnahme nicht zu vertretender Modernisierungen.</SubText>
        </>
      )}
      {vertrag.typ === "moebliert" && (
        <>
          <SubText>(1) Die monatliche Miete setzt sich wie folgt zusammen:</SubText>
          <table style={{ width: "100%", borderCollapse: "collapse", marginLeft: "20pt", marginTop: "4pt", fontSize: "10.5pt" }}><tbody>
            <tr><td>Grundmiete (Nettokaltmiete)</td><td style={{ textAlign: "right" }}>{fmtEUR(vertrag.grundmiete)}</td></tr>
            <tr><td>Möblierungszuschlag</td><td style={{ textAlign: "right" }}>{fmtEUR(vertrag.moebel_zuschlag)}</td></tr>
          </tbody></table>
          {vertrag.moebliert_anpassung === "staffel" && (
            <>
              <SubText style={{ marginTop: "8pt" }}>(2) Die Grundmiete erhöht sich gemäß § 557a BGB nach folgender Staffel:</SubText>
              {vertrag.staffeln && vertrag.staffeln.length > 0 ? (
                <table style={{ width: "100%", borderCollapse: "collapse", marginLeft: "20pt", marginTop: "4pt", fontSize: "10.5pt" }}>
                  <thead><tr style={{ borderBottom: "0.5pt solid #1A1714" }}><th style={{ textAlign: "left", padding: "3pt 0", width: "40%" }}>ab</th><th style={{ textAlign: "left", padding: "3pt 0" }}>neue Nettokaltmiete</th></tr></thead>
                  <tbody>{vertrag.staffeln.map((s, i) => (<tr key={i}><td style={{ padding: "3pt 0" }}>{fmtDate(s.datum)}</td><td style={{ padding: "3pt 0", fontWeight: 600 }}>{fmtEUR(s.betrag)}</td></tr>))}</tbody>
                </table>
              ) : <SubText style={{ marginLeft: "20pt", color: "#8A8377" }}>– keine Staffeln eingetragen –</SubText>}
              <SubText style={{ fontSize: "9.5pt", color: "#8A8377" }}>(3) Der Möblierungszuschlag bleibt während der Befristung unverändert. Mieterhöhungen nach §§ 558 bis 559b BGB sind während der Geltung der Staffelmiete ausgeschlossen.</SubText>
            </>
          )}
          {vertrag.moebliert_anpassung === "index" && (
            <>
              <SubText style={{ marginTop: "8pt" }}>(2) Die Grundmiete wird gemäß § 557b BGB durch den vom Statistischen Bundesamt ermittelten <strong>Verbraucherpreisindex für Deutschland</strong> (Basisjahr {vertrag.index_basisjahr} = 100) bestimmt (Indexmiete).</SubText>
              {vertrag.index_basiswert && <SubText style={{ marginLeft: "20pt" }}>Der Indexstand bei Vertragsabschluss beträgt <strong>{vertrag.index_basiswert}</strong> (Stand: {vertrag.index_basismonat || "____"}).</SubText>}
              <SubText>(3) Eine Änderung der Grundmiete kann frühestens 12 Monate nach Beginn des Mietverhältnisses oder der letzten Mietanpassung verlangt werden. Die Mietänderung ist durch Erklärung in Textform geltend zu machen.</SubText>
              <SubText style={{ fontSize: "9.5pt", color: "#8A8377" }}>(4) Der Möblierungszuschlag bleibt während der Befristung unverändert. Mieterhöhungen nach §§ 558 bis 559 BGB sind während der Geltung der Indexmiete ausgeschlossen.</SubText>
            </>
          )}
        </>
      )}
      <SubText style={{ marginTop: "10pt" }}>Hinzu kommen:</SubText>
      <table style={{ width: "100%", borderCollapse: "collapse", marginLeft: "20pt", fontSize: "10.5pt" }}><tbody>
        <tr><td>Vorauszahlung auf Betriebskosten</td><td style={{ textAlign: "right" }}>{fmtEUR(vertrag.nk_vz)}</td></tr>
        <tr><td>Vorauszahlung auf Heizkosten</td><td style={{ textAlign: "right" }}>{fmtEUR(vertrag.hk_vz)}</td></tr>
        <tr style={{ borderTop: "0.5pt solid #1A1714", fontWeight: 700 }}><td style={{ paddingTop: "4pt" }}>Gesamtmiete monatlich</td><td style={{ textAlign: "right", paddingTop: "4pt" }}>{fmtEUR(gesamtMiete)}</td></tr>
      </tbody></table>
      <SubText style={{ marginTop: "10pt" }}>Die Miete ist monatlich im Voraus, spätestens am <strong>{fallback(vertrag.zahlungstag, "3.")}</strong> Werktag des Monats, kostenfrei auf folgendes Konto zu zahlen:</SubText>
      <SubText style={{ marginLeft: "20pt" }}>
        Kontoinhaber: {fallback((objekt && objekt.kontoinhaber) || (vermieterList[0] && vermieterList[0].name))}<br />
        IBAN: {fallback(objekt && objekt.iban)}<br />
        Bank: {fallback(objekt && objekt.bank)}
      </SubText>

      <ParagraphHeader nummer="4" titel="Betriebskosten" />
      <SubText>(1) Der Mieter trägt zusätzlich zur Grundmiete die Betriebskosten im Sinne des § 1 BetrKV i. V. m. § 2 BetrKV.</SubText>
      <SubText>(2) Der Vermieter erstellt jährlich eine Abrechnung. Die Abrechnung ist dem Mieter spätestens bis zum Ablauf des zwölften Monats nach Ende des Abrechnungszeitraums mitzuteilen (§ 556 Abs. 3 BGB).</SubText>
      <SubText>(3) Umlageschlüssel: Soweit nicht anders geregelt, werden die Betriebskosten <strong>nach Wohnfläche</strong> umgelegt. Heiz- und Warmwasserkosten nach HeizkostenV.</SubText>

      <ParagraphHeader nummer="5" titel="Kaution" />
      <SubText>(1) Der Mieter leistet zur Sicherung aller Ansprüche eine Mietsicherheit in Höhe von <strong>{fmtEUR(vertrag.kaution)}</strong> (max. drei Nettokaltmieten gem. § 551 BGB).</SubText>
      <SubText>(2) Die Kaution ist {vertrag.kaution_raten === "1" ? "in einer Summe mit Mietbeginn" : `in ${vertrag.kaution_raten} gleichen monatlichen Raten zu zahlen; die erste Rate ist mit Mietbeginn fällig`} zu erbringen.</SubText>
      <SubText>(3) Der Vermieter legt die Kaution gemäß § 551 Abs. 3 BGB getrennt von seinem Vermögen bei einem Kreditinstitut zum üblichen Zinssatz mit dreimonatiger Kündigungsfrist an. Die Zinsen stehen dem Mieter zu und erhöhen die Sicherheit.</SubText>

      <ParagraphHeader nummer="6" titel="Erhaltung der Mietsache · Schönheitsreparaturen" />
      <SubText>(1) Die Instandhaltung und Instandsetzung obliegt dem Vermieter (§ 535 Abs. 1 S. 2 BGB).</SubText>
      {vertrag.schoenheitsreparaturen_uebertragen && vertrag.uebergabezustand === "renoviert" ? (
        <>
          <SubText>(2) Der Mieter übernimmt die Schönheitsreparaturen während der Mietzeit nach Erforderlichkeit auf eigene Kosten fachgerecht. Die Wohnung wird in <strong>renoviertem Zustand</strong> übergeben. Starre Renovierungsfristen werden nicht vereinbart.</SubText>
          <SubText>(3) Schönheitsreparaturen umfassen: Tapezieren, Anstreichen oder Kalken der Wände und Decken, Streichen der Fußböden, Heizkörper, Innentüren sowie der Fenster und Außentüren von innen.</SubText>
          <SubText style={{ fontSize: "9.5pt", color: "#8A8377" }}>(4) Eine Endrenovierungsklausel wird nicht vereinbart.</SubText>
        </>
      ) : (
        <SubText>(2) Die Schönheitsreparaturen werden vom Vermieter getragen.</SubText>
      )}
      <SubText style={{ fontSize: "9.5pt", color: "#8A8377" }}>(5) Kleinreparaturen an Gegenständen, die dem direkten Zugriff des Mieters unterliegen, trägt der Mieter bis zu einer Höhe von <strong>{fmtEUR(vertrag.kleinreparatur_einzelfall)} im Einzelfall</strong>, maximal <strong>{vertrag.kleinreparatur_jahresanteil} % der Jahresnettokaltmiete</strong> im Kalenderjahr.</SubText>

      <ParagraphHeader nummer="7" titel="Nutzung der Mietsache" />
      <SubText>(1) Die Mietsache darf nur zu Wohnzwecken genutzt werden. Eine gewerbliche Nutzung bedarf der vorherigen schriftlichen Zustimmung.</SubText>
      <SubText>(2) Untervermietung bedarf der vorherigen Erlaubnis des Vermieters (§ 540 BGB). Ein Anspruch besteht nach § 553 BGB bei berechtigtem Interesse.</SubText>

      <ParagraphHeader nummer="8" titel="Tierhaltung" />
      <SubText>
        {vertrag.tierhaltung === "verboten" && "Die Haltung von Tieren ist ohne Zustimmung des Vermieters nicht gestattet. Kleintiere in haushaltsüblichem Umfang sind erlaubnisfrei zulässig."}
        {vertrag.tierhaltung === "kleintiere" && "Die Haltung von Kleintieren in haushaltsüblichem Umfang ist gestattet. Hunde und Katzen bedürfen der vorherigen Zustimmung des Vermieters, die nur aus wichtigem Grund verweigert werden darf."}
        {vertrag.tierhaltung === "auf_anfrage" && "Jegliche Tierhaltung außer Kleintieren in haushaltsüblichem Umfang bedarf der vorherigen schriftlichen Zustimmung."}
      </SubText>

      <ParagraphHeader nummer="9" titel="Schlüssel" />
      <SubText>(1) Bei Vertragsbeginn werden übergeben:</SubText>
      <SubText style={{ marginLeft: "20pt" }}>
        Wohnungsschlüssel: {fallback(vertrag.schluessel_wohnung)} Stück<br />
        Haustürschlüssel: {fallback(vertrag.schluessel_haus)} Stück<br />
        Briefkastenschlüssel: {fallback(vertrag.schluessel_briefkasten)} Stück
        {vertrag.schluessel_sonstige && <><br />Sonstige: {vertrag.schluessel_sonstige}</>}
      </SubText>
      <SubText style={{ fontSize: "9.5pt", color: "#8A8377" }}>(2) Die Anfertigung weiterer Schlüssel ist nur mit Zustimmung zulässig. Bei Vertragsende sind alle Schlüssel zurückzugeben.</SubText>

      <ParagraphHeader nummer="10" titel="Bauliche Veränderungen" />
      <SubText>Bauliche Veränderungen durch den Mieter bedürfen der vorherigen schriftlichen Zustimmung. Bei Vertragsende ist der ursprüngliche Zustand auf Verlangen wiederherzustellen, sofern nichts anderes vereinbart.</SubText>

      <ParagraphHeader nummer="11" titel="Kündigung" />
      {vertrag.typ === "moebliert" ? (
        <SubText>Eine ordentliche Kündigung ist ausgeschlossen. Das Recht zur außerordentlichen Kündigung aus wichtigem Grund (§ 543 BGB) sowie zur fristlosen Kündigung wegen Zahlungsverzugs (§ 569 BGB) bleibt unberührt.</SubText>
      ) : (
        <>
          <SubText>(1) Die Kündigung bedarf der Schriftform. Es gelten die gesetzlichen Kündigungsfristen nach § 573c BGB:</SubText>
          <SubText style={{ marginLeft: "20pt" }}>– Mieter: 3 Monate zum Monatsende<br />– Vermieter: 3 Monate bei Mietdauer bis 5 Jahre, 6 Monate bei mehr als 5 Jahren, 9 Monate bei mehr als 8 Jahren</SubText>
          <SubText style={{ fontSize: "9.5pt", color: "#8A8377" }}>(2) Das Recht zur außerordentlichen Kündigung aus wichtigem Grund (§ 543 BGB) bleibt unberührt.</SubText>
        </>
      )}

      <ParagraphHeader nummer="12" titel="Hausordnung" />
      <SubText>Die Hausordnung ist als Anlage Bestandteil dieses Vertrags. Der Mieter ist verpflichtet, die Hausordnung einzuhalten und für deren Beachtung durch Hausgenossen und Besucher zu sorgen.</SubText>

      {vertrag.eigene_klauseln.map((k) => {
        const num = nextParaNum++;
        return (
          <Fragment key={k.id}>
            <ParagraphHeader nummer={String(num)} titel={k.titel || "Zusätzliche Vereinbarung"} />
            <SubText style={{ whiteSpace: "pre-wrap" }}>{k.text}</SubText>
          </Fragment>
        );
      })}
      {vertrag.sonstige_vereinbarungen && (
        <>
          <ParagraphHeader nummer={String(nextParaNum++)} titel="Sonstige Vereinbarungen" />
          <SubText style={{ whiteSpace: "pre-wrap" }}>{vertrag.sonstige_vereinbarungen}</SubText>
        </>
      )}
      <ParagraphHeader nummer={String(nextParaNum)} titel="Schlussbestimmungen" />
      <SubText>(1) Änderungen und Ergänzungen dieses Vertrags bedürfen der Schriftform. Dies gilt auch für die Aufhebung dieser Schriftformklausel.</SubText>
      <SubText>(2) Sollten einzelne Bestimmungen unwirksam sein, bleibt die Wirksamkeit der übrigen unberührt. An die Stelle der unwirksamen Bestimmung tritt die gesetzliche Regelung.</SubText>
      <SubText>(3) Anlagen: Hausordnung · Belehrung Schönheitsreparaturen · DSGVO-Hinweis{vertrag.typ === "moebliert" && " · Inventarliste"}</SubText>
      <SignatureBlock vermieterCount={Math.max(vermieterList.length, 1)} mieterCount={mieter.length} />
    </Page>
  );
}

function UebergabeprotokollPreview({ state }) {
  const mv = getActiveMV(state);
  if (!mv) return <EmptyDoc msg="Kein Mietverhältnis aktiv." />;
  const objekt = getMVObjekt(state, mv);
  const einheit = getMVEinheit(state, mv);
  const vermieterList = getMVVermieter(state, mv);
  const { vertrag, personen: mieter, uebergabe } = mv;
  const zh = (n) => ({ fontSize: "12pt", fontWeight: 700, marginTop: "16pt", marginBottom: "6pt", borderBottom: "0.5pt solid rgba(26,23,20,0.25)", paddingBottom: "2pt" });
  return (
    <Page id="doc-uebergabe" vermieter={vermieterList}>
      <div style={{ marginBottom: "24pt" }}>
        <div style={{ fontFamily: "Jost, sans-serif", fontSize: "8pt", letterSpacing: "0.28em", textTransform: "uppercase", color: "#8A8377", marginBottom: "8pt" }}>Anlage zum Mietvertrag</div>
        <h1 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "30pt", fontWeight: 300, margin: 0, color: "#1A1714", letterSpacing: "-0.01em" }}>Übergabeprotokoll</h1>
      </div>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "10.5pt", marginBottom: "12pt" }}><tbody>
        <tr><td style={{ width: "30%", padding: "3pt 0", fontWeight: 600 }}>Datum der Übergabe:</td><td>{fmtDate(uebergabe.datum)}</td></tr>
        <tr><td style={{ padding: "3pt 0", fontWeight: 600 }}>Objekt:</td><td>{fallback(objekt && objekt.adresse)}, {fallback(objekt && objekt.plz_ort)}</td></tr>
        <tr><td style={{ padding: "3pt 0", fontWeight: 600 }}>Einheit:</td><td>{fallback(einheit && einheit.bezeichnung)}, {fallback(einheit && einheit.etage)}</td></tr>
        <tr><td style={{ padding: "3pt 0", fontWeight: 600 }}>Vermieter:</td><td>{vermieterList.map((v) => v.name).filter(Boolean).join(" / ") || <Blank width="120pt" />}</td></tr>
        <tr><td style={{ padding: "3pt 0", fontWeight: 600, verticalAlign: "top" }}>Mieter:</td><td>{mieter.map((m, i) => (
          <div key={i}>{m.name || <Blank width="120pt" />}{m.ausweis_nr ? <span style={{ color: "#8A8377" }}> (Ausweis-Nr.: {m.ausweis_nr})</span> : null}</div>
        ))}</td></tr>
      </tbody></table>
      <h3 style={zh()}>1. Zählerstände</h3>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "10.5pt", border: "0.5pt solid rgba(26,23,20,0.15)" }}>
        <thead><tr style={{ backgroundColor: "#FAF5EA" }}>
          <th style={{ padding: "5pt", textAlign: "left", border: "0.5pt solid rgba(26,23,20,0.15)", width: "30%" }}>Zähler</th>
          <th style={{ padding: "5pt", textAlign: "left", border: "0.5pt solid rgba(26,23,20,0.15)", width: "35%" }}>Zählernummer</th>
          <th style={{ padding: "5pt", textAlign: "left", border: "0.5pt solid rgba(26,23,20,0.15)" }}>Stand</th>
        </tr></thead>
        <tbody>
          {[["Strom", zaehlerNr(mv, einheit, "strom_nr"), uebergabe.strom_stand, "kWh"], ["Gas", zaehlerNr(mv, einheit, "gas_nr"), uebergabe.gas_stand, "m³"], ["Wasser kalt", zaehlerNr(mv, einheit, "wasser_kalt_nr"), uebergabe.wasser_kalt_stand, "m³"], ["Wasser warm", zaehlerNr(mv, einheit, "wasser_warm_nr"), uebergabe.wasser_warm_stand, "m³"], ["Heizung", zaehlerNr(mv, einheit, "heizung_nr"), uebergabe.heizung_stand, "Einheiten"]].map((row, i) => (
            <tr key={i}>
              <td style={{ padding: "5pt", border: "0.5pt solid rgba(26,23,20,0.15)" }}>{row[0]}</td>
              <td style={{ padding: "5pt", border: "0.5pt solid rgba(26,23,20,0.15)" }}>{fallback(row[1])}</td>
              <td style={{ padding: "5pt", border: "0.5pt solid rgba(26,23,20,0.15)" }}>{row[2] ? `${row[2]} ${row[3]}` : <Blank width="90pt" />}</td>
            </tr>
          ))}
        </tbody>
      </table>
      <h3 style={zh()}>2. Zustand der Räume</h3>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "10pt", border: "0.5pt solid rgba(26,23,20,0.15)" }}>
        <thead><tr style={{ backgroundColor: "#FAF5EA" }}>
          <th style={{ padding: "5pt", textAlign: "left", border: "0.5pt solid rgba(26,23,20,0.15)", width: "22%" }}>Raum</th>
          <th style={{ padding: "5pt", textAlign: "left", border: "0.5pt solid rgba(26,23,20,0.15)", width: "33%" }}>Zustand</th>
          <th style={{ padding: "5pt", textAlign: "left", border: "0.5pt solid rgba(26,23,20,0.15)" }}>Mängel / Bemerkungen</th>
        </tr></thead>
        <tbody>{uebergabe.raeume.map((r, i) => (
          <tr key={i}>
            <td style={{ padding: "5pt", border: "0.5pt solid rgba(26,23,20,0.15)", fontWeight: 600 }}>{r.name}</td>
            <td style={{ padding: "5pt", border: "0.5pt solid rgba(26,23,20,0.15)" }}>{fallback(r.zustand)}</td>
            <td style={{ padding: "5pt", border: "0.5pt solid rgba(26,23,20,0.15)" }}>{fallback(r.maengel, "keine")}</td>
          </tr>
        ))}</tbody>
      </table>
      <h3 style={zh()}>3. Schlüssel</h3>
      <SubText style={{ marginLeft: "20pt" }}>
        Wohnungsschlüssel: {fallback(vertrag.schluessel_wohnung)} Stück<br />
        Haustürschlüssel: {fallback(vertrag.schluessel_haus)} Stück<br />
        Briefkastenschlüssel: {fallback(vertrag.schluessel_briefkasten)} Stück
        {vertrag.schluessel_sonstige && <><br />Sonstige: {vertrag.schluessel_sonstige}</>}
      </SubText>
      <h3 style={zh()}>4. Rauchwarnmelder</h3>
      <SubText>Anzahl: {fallback(uebergabe.rauchmelder_anzahl)} Stück. Funktion geprüft: {uebergabe.rauchmelder_funktion ? "☒ ja  ☐ nein" : "☐ ja  ☒ nein"}. Hinweis auf § 48 LBauO Bremen: Rauchwarnmelder sind vorgeschrieben, Betriebsbereitschaft ist sicherzustellen.</SubText>
      {uebergabe.bemerkungen && (<><h3 style={zh()}>5. Sonstige Bemerkungen</h3><SubText style={{ whiteSpace: "pre-wrap" }}>{uebergabe.bemerkungen}</SubText></>)}
      <SubText style={{ marginTop: "16pt", fontSize: "9.5pt", color: "#8A8377" }}>Beide Parteien bestätigen mit ihrer Unterschrift, dass die Wohnung in dem oben beschriebenen Zustand übergeben wurde.</SubText>
      <SignatureBlock vermieterCount={Math.max(vermieterList.length, 1)} mieterCount={mieter.length} />
    </Page>
  );
}

function HausordnungPreview({ state }) {
  const mv = getActiveMV(state);
  const objekt = mv && getMVObjekt(state, mv);
  const vermieterList = mv ? getMVVermieter(state, mv) : state.vermieter;
  return (
    <Page id="doc-hausordnung" vermieter={vermieterList}>
      <div style={{ marginBottom: "24pt" }}>
        <div style={{ fontFamily: "Jost, sans-serif", fontSize: "8pt", letterSpacing: "0.28em", textTransform: "uppercase", color: "#8A8377", marginBottom: "8pt" }}>Anlage zum Mietvertrag</div>
        <h1 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "30pt", fontWeight: 300, margin: 0, color: "#1A1714", letterSpacing: "-0.01em" }}>Hausordnung</h1>
        <p style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "12pt", fontStyle: "italic", color: "#A8674F", marginTop: "6pt" }}>{fallback(objekt && objekt.adresse)}, {fallback(objekt && objekt.plz_ort)}</p>
      </div>
      <SubText>Damit alle Hausbewohner ungestört wohnen können, ist gegenseitige Rücksichtnahme erforderlich. Die Hausordnung ist Bestandteil des Mietvertrags.</SubText>

function MieterhoehungIndexPreview({ state }) {
  const mv = getActiveMV(state);
  if (!mv) return <EmptyDoc msg="Kein Mietverhältnis aktiv." />;
  const objekt = getMVObjekt(state, mv);
  const einheit = getMVEinheit(state, mv);
  const vermieterList = getMVVermieter(state, mv);
  const s = mv.schreiben.mieterhoehung_index;
  const v = mv.vertrag;
  const alterIndex = parseFloat(v.index_basiswert || "0");
  const neuerIndex = parseFloat(s.neuer_index || "0");
  const alteMiete = parseFloat(v.grundmiete || "0");
  let berechneteMiete = "";
  if (alterIndex > 0 && neuerIndex > 0 && alteMiete > 0) {
    berechneteMiete = (alteMiete * (neuerIndex / alterIndex)).toFixed(2);
  }
  const aenderungProzent = (alterIndex > 0 && neuerIndex > 0) ? (((neuerIndex - alterIndex) / alterIndex) * 100).toFixed(2) : "";
  const mieterAdresse = objekt ? `${objekt.adresse || ""}, ${objekt.plz_ort || ""}` : "";
  return (
    <LetterPage id="doc-mieterhoehung" vermieter={vermieterList} mieter={mv.personen} ort="Bremerhaven" datum={s.datum_heute} subject={`Mietanpassung gemäß § 557b BGB (Indexmiete) – Wohnung ${fallback(einheit && einheit.bezeichnung, "")}`} mieterAdresse={mieterAdresse}>
      <SubText>{getAnrede(mv.personen)}</SubText>
      <SubText>gemäß § 3 des zwischen uns geschlossenen Mietvertrags wurde eine Indexmiete nach § 557b BGB vereinbart. Die Miete wird auf Grundlage des Verbraucherpreisindex für Deutschland (Basisjahr {v.index_basisjahr} = 100) bestimmt.</SubText>
      <SubText style={{ marginTop: "12pt" }}>Auf Grundlage der aktuell veröffentlichten Indexwerte teilen wir Ihnen folgende Mietanpassung mit:</SubText>
      <table style={{ width: "100%", borderCollapse: "collapse", marginLeft: "20pt", marginTop: "8pt", fontSize: "10.5pt" }}><tbody>
        <tr><td style={{ padding: "3pt 0" }}>Bisheriger Indexstand ({fallback(v.index_basismonat, "Basis")}):</td><td style={{ textAlign: "right" }}><strong>{fallback(v.index_basiswert)}</strong></td></tr>
        <tr><td style={{ padding: "3pt 0" }}>Neuer Indexstand ({fallback(s.neuer_indexmonat, "____")}):</td><td style={{ textAlign: "right" }}><strong>{fallback(s.neuer_index)}</strong></td></tr>
        <tr><td style={{ padding: "3pt 0" }}>Prozentuale Änderung:</td><td style={{ textAlign: "right" }}><strong>{aenderungProzent ? `${aenderungProzent.replace(".", ",")} %` : "____"}</strong></td></tr>
        <tr style={{ borderTop: "0.5pt solid rgba(26,23,20,0.25)" }}><td style={{ padding: "3pt 0" }}>Bisherige Nettokaltmiete:</td><td style={{ textAlign: "right" }}>{fmtEUR(v.grundmiete)}</td></tr>
        <tr><td style={{ padding: "3pt 0" }}>Rechnerisch neue Nettokaltmiete:</td><td style={{ textAlign: "right" }}>{berechneteMiete ? fmtEUR(berechneteMiete) : "____"}</td></tr>
        <tr style={{ fontWeight: 700 }}><td style={{ padding: "3pt 0" }}>Festgesetzte neue Nettokaltmiete:</td><td style={{ textAlign: "right" }}>{fmtEUR(s.neue_miete)}</td></tr>
      </tbody></table>
      <SubText style={{ marginTop: "12pt" }}>Die neue Nettokaltmiete in Höhe von <strong>{fmtEUR(s.neue_miete)}</strong> wird wirksam ab dem <strong>{fmtDate(s.wirksam_ab)}</strong>. Die Vorauszahlungen auf Betriebs- und Heizkosten bleiben hiervon unberührt.</SubText>
      <SubText>Wir bitten Sie, ab dem genannten Termin die Daueranweisung entsprechend anzupassen. Eine Zustimmung Ihrerseits ist bei der Indexmiete nicht erforderlich; das Schreiben dient der Mitteilung in Textform gemäß § 557b Abs. 3 BGB.</SubText>
      <SubText style={{ fontSize: "9.5pt", color: "#8A8377", marginTop: "12pt" }}>Hinweis: Die letzte Mietanpassung muss mindestens 12 Monate zurückliegen. Die Anpassung wird ab dem übernächsten Monat wirksam nach Zugang der Erklärung.</SubText>
    </LetterPage>
  );
}

  const vermieterList = getMVVermieter(state, mv);
  const s = mv.schreiben.mieterhoehung_558 || {};
  const v = mv.vertrag;
  const alteMiete = parseFloat(v.grundmiete || "0");
  const neueMiete = parseFloat(s.neue_miete || "0");
  const erhoehung = neueMiete - alteMiete;
  const erhoehungProz = alteMiete > 0 ? ((erhoehung / alteMiete) * 100).toFixed(2) : "";
  const flaeche = parseFloat(einheit && einheit.wohnflaeche || "0");
  const neuQm = (flaeche > 0 && neueMiete > 0) ? (neueMiete / flaeche).toFixed(2) : "";
  const altQm = (flaeche > 0 && alteMiete > 0) ? (alteMiete / flaeche).toFixed(2) : "";
  const mieterAdresse = objekt ? `${objekt.adresse || ""}, ${objekt.plz_ort || ""}` : "";

  return (
    <LetterPage id="doc-mieterhoehung558" vermieter={vermieterList} mieter={mv.personen} ort="Bremerhaven" datum={s.datum_heute} subject={`Mieterhöhungsverlangen nach § 558 BGB – Wohnung ${fallback(einheit && einheit.bezeichnung, "")}`} mieterAdresse={mieterAdresse}>
      <SubText>{getAnrede(mv.personen)}</SubText>
      <SubText>auf Grundlage des § 558 BGB bitten wir Sie um Zustimmung zu einer Erhöhung der monatlichen Nettokaltmiete für die o. g. Wohnung.</SubText>

      <table style={{ width: "100%", borderCollapse: "collapse", marginLeft: "20pt", marginTop: "8pt", fontSize: "10.5pt" }}><tbody>
        <tr><td style={{ padding: "3pt 0" }}>Bisherige Nettokaltmiete:</td><td style={{ textAlign: "right" }}>{fmtEUR(v.grundmiete)} {altQm && <span style={{ color: "#8A8377" }}>({altQm.replace(".", ",")} €/m²)</span>}</td></tr>
        <tr><td style={{ padding: "3pt 0" }}>Letzte Mieterhöhung am:</td><td style={{ textAlign: "right" }}>{fallback(s.datum_letzte_erhoehung, "—")}</td></tr>
        <tr style={{ fontWeight: 700, borderTop: "0.5pt solid rgba(26,23,20,0.25)" }}><td style={{ padding: "3pt 0" }}>Neue Nettokaltmiete (verlangt):</td><td style={{ textAlign: "right" }}>{fmtEUR(s.neue_miete)} {neuQm && <span style={{ fontWeight: 400, color: "#8A8377" }}>({neuQm.replace(".", ",")} €/m²)</span>}</td></tr>
        <tr><td style={{ padding: "3pt 0" }}>Erhöhung:</td><td style={{ textAlign: "right" }}>{erhoehung > 0 ? fmtEUR(erhoehung) : "—"} {erhoehungProz && <span style={{ color: "#8A8377" }}>({erhoehungProz.replace(".", ",")} %)</span>}</td></tr>
        <tr><td style={{ padding: "3pt 0" }}>Wirksam ab:</td><td style={{ textAlign: "right" }}>{fmtDate(s.wirksam_ab)}</td></tr>
      </tbody></table>

      <SubText style={{ marginTop: "12pt" }}><strong>Begründung:</strong></SubText>
      <SubText>Die verlangte Miete entspricht der ortsüblichen Vergleichsmiete im Sinne des § 558 Abs. 2 BGB. Zur Begründung verweisen wir auf:</SubText>
      <SubText style={{ marginLeft: "20pt" }}>{fallback(s.begruendung, "Mietspiegel der Stadt Bremerhaven, Stand ____________________, Felddaten: Baualtersklasse ____, Ausstattung ____, Wohnlage ____.")}</SubText>

      <SubText style={{ marginTop: "12pt" }}>Die Mieterhöhung hält die Voraussetzungen des § 558 BGB ein:</SubText>
      <SubText style={{ marginLeft: "20pt", fontSize: "10pt" }}>
        – seit der letzten Mieterhöhung sind mindestens 15 Monate vergangen (Wartefrist gem. § 558 Abs. 1 S. 2 BGB)<br />
        – die Erhöhung übersteigt die Kappungsgrenze von 20 % (in 3 Jahren) nicht (§ 558 Abs. 3 BGB)<br />
        – das Verlangen wird in Textform erklärt und begründet (§ 558a BGB)
      </SubText>

      <SubText style={{ marginTop: "12pt" }}>
        Wir bitten Sie, Ihre <strong>Zustimmung zu der Mieterhöhung schriftlich</strong> bis zum Ablauf des zweiten Kalendermonats nach Zugang dieses Schreibens zu erklären (§ 558b Abs. 2 BGB). Bei Zustimmung schulden Sie die neue Miete erstmals ab dem genannten Wirksamkeitsdatum.
      </SubText>
      <SubText style={{ fontSize: "9.5pt", color: "#8A8377", marginTop: "8pt" }}>
        Sollten Sie der Mieterhöhung nicht oder nur teilweise zustimmen, sind wir berechtigt, innerhalb von drei Monaten nach Ablauf der Zustimmungsfrist Klage auf Erteilung der Zustimmung beim örtlich zuständigen Amtsgericht zu erheben (§ 558b Abs. 2 S. 2 BGB).
      </SubText>
    </LetterPage>
  );
}

function ModernisierungPreview({ state }) {
  const mv = getActiveMV(state);
  if (!mv) return <EmptyDoc msg="Kein Mietverhältnis aktiv." />;
  const objekt = getMVObjekt(state, mv);
  const einheit = getMVEinheit(state, mv);
  const vermieterList = getMVVermieter(state, mv);
  const s = mv.schreiben.modernisierung || {};
  const v = mv.vertrag;
  const kosten = parseFloat(s.kosten_brutto || "0");
  const erhaltung = parseFloat(s.erhaltungsanteil || "0");
  const drittmittel = parseFloat(s.drittmittel || "0");
  const umlagefaehig = Math.max(0, kosten - erhaltung - drittmittel);
  const jahresumlage = umlagefaehig * 0.08;
  const monatlich = jahresumlage / 12;
  const flaeche = parseFloat((einheit && einheit.wohnflaeche) || "0");
  const proQm = flaeche > 0 ? monatlich / flaeche : 0;
  const alteMiete = parseFloat(v.grundmiete || "0");
  const neueMiete = alteMiete + monatlich;
  const mieterAdresse = objekt ? `${objekt.adresse || ""}, ${objekt.plz_ort || ""}` : "";

  return (
    <LetterPage id="doc-modernisierung" vermieter={vermieterList} mieter={mv.personen} ort="Bremerhaven" datum={s.datum_heute} subject={`Mieterhöhung wegen Modernisierung gemäß § 559 BGB – Wohnung ${fallback(einheit && einheit.bezeichnung, "")}`} mieterAdresse={mieterAdresse}>
      <SubText>{getAnrede(mv.personen)}</SubText>
      <SubText>im Zeitraum vom ____________ bis ____________ haben wir an der o. g. Wohnung bzw. dem Gebäude Modernisierungsmaßnahmen durchgeführt. Auf Grundlage des § 559 BGB erhöhen wir die monatliche Miete entsprechend der nachstehenden Berechnung.</SubText>

      <SubText style={{ marginTop: "12pt", fontWeight: 700 }}>1. Beschreibung der Modernisierungsmaßnahme</SubText>
      <SubText>{fallback(s.art, "Art der Modernisierung: ____________")}</SubText>
      {s.detail && <SubText style={{ whiteSpace: "pre-wrap" }}>{s.detail}</SubText>}
      <SubText style={{ fontSize: "9.5pt", color: "#8A8377" }}>Die Maßnahme stellt eine Modernisierung i. S. d. § 555b BGB dar (insbes. Energieeinsparung, Verbrauchsreduzierung, nachhaltige Erhöhung des Gebrauchswerts oder Verbesserung der allgemeinen Wohnverhältnisse).</SubText>

      <SubText style={{ marginTop: "12pt", fontWeight: 700 }}>2. Kostenaufstellung und Berechnung</SubText>
      <table style={{ width: "100%", borderCollapse: "collapse", marginLeft: "20pt", marginTop: "4pt", fontSize: "10.5pt" }}><tbody>
        <tr><td style={{ padding: "3pt 0" }}>Gesamtkosten der Maßnahme (brutto):</td><td style={{ textAlign: "right" }}>{fmtEUR(s.kosten_brutto)}</td></tr>
        <tr><td style={{ padding: "3pt 0" }}>./. Anteil Erhaltungsaufwand (nicht umlagefähig):</td><td style={{ textAlign: "right" }}>{fmtEUR(s.erhaltungsanteil)}</td></tr>
        <tr><td style={{ padding: "3pt 0" }}>./. Drittmittel (Zuschüsse, Förderung):</td><td style={{ textAlign: "right" }}>{fmtEUR(s.drittmittel)}</td></tr>
        <tr style={{ borderTop: "0.5pt solid rgba(26,23,20,0.25)", fontWeight: 600 }}><td style={{ padding: "3pt 0" }}>Umlagefähige Modernisierungskosten:</td><td style={{ textAlign: "right" }}>{fmtEUR(umlagefaehig)}</td></tr>
        <tr><td style={{ padding: "3pt 0" }}>× 8 % p. a. (§ 559 Abs. 1 BGB):</td><td style={{ textAlign: "right" }}>{fmtEUR(jahresumlage)}</td></tr>
        <tr><td style={{ padding: "3pt 0" }}>÷ 12 Monate = monatliche Erhöhung:</td><td style={{ textAlign: "right" }}>{fmtEUR(monatlich)}</td></tr>
        {flaeche > 0 && <tr><td style={{ padding: "3pt 0", fontSize: "9.5pt", color: "#8A8377" }}>(entspricht {proQm.toFixed(2).replace(".", ",")} €/m² bei {flaeche} m²):</td><td></td></tr>}
      </tbody></table>

      <SubText style={{ marginTop: "12pt", fontWeight: 700 }}>3. Neue Miete</SubText>
      <table style={{ width: "100%", borderCollapse: "collapse", marginLeft: "20pt", marginTop: "4pt", fontSize: "10.5pt" }}><tbody>
        <tr><td style={{ padding: "3pt 0" }}>Bisherige Nettokaltmiete:</td><td style={{ textAlign: "right" }}>{fmtEUR(v.grundmiete)}</td></tr>
        <tr><td style={{ padding: "3pt 0" }}>+ Modernisierungsumlage:</td><td style={{ textAlign: "right" }}>{fmtEUR(monatlich)}</td></tr>
        <tr style={{ fontWeight: 700, borderTop: "0.5pt solid #1A1714" }}><td style={{ padding: "3pt 0" }}>Neue Nettokaltmiete:</td><td style={{ textAlign: "right" }}>{fmtEUR(neueMiete)}</td></tr>
      </tbody></table>

      <SubText style={{ marginTop: "12pt" }}>Die neue Miete in Höhe von <strong>{fmtEUR(neueMiete)}</strong> ist erstmals zum <strong>{fmtDate(s.wirksam_ab)}</strong> zu zahlen. Die Erhöhung wird gemäß § 559b Abs. 2 BGB mit Beginn des dritten Monats nach Zugang dieser Erklärung wirksam.</SubText>

      <SubText style={{ fontSize: "9.5pt", color: "#8A8377", marginTop: "12pt", fontStyle: "italic" }}>
        Härtefallregelung: Soweit die Mieterhöhung für Sie oder einen Angehörigen Ihres Haushalts eine Härte bedeuten würde, die auch unter Würdigung der berechtigten Interessen des Vermieters nicht zu rechtfertigen ist, ist die Modernisierungsumlage ausgeschlossen (§ 559 Abs. 4 BGB). Sie können sich auf diesen Härtegrund nur berufen, wenn Sie ihn uns bis zum Ablauf des Monats vor Beginn der Erhöhung in Textform mitteilen (§ 555d Abs. 3 BGB).
      </SubText>
      <SubText style={{ fontSize: "9.5pt", color: "#8A8377", marginTop: "8pt", fontStyle: "italic" }}>
        Kappungsgrenze § 559 Abs. 3a BGB: Die monatliche Miete darf sich innerhalb von 6 Jahren – von Erhöhungen nach §§ 558, 560 BGB abgesehen – nicht um mehr als 3,00 €/m² Wohnfläche erhöhen (2,00 €/m², wenn die Miete vor der Erhöhung unter 7,00 €/m² lag).
      </SubText>
    </LetterPage>
  );
}

function KautionsabrechnungPreview({ state }) {
  const mv = getActiveMV(state);
  if (!mv) return <EmptyDoc msg="Kein Mietverhältnis aktiv." />;
  const objekt = getMVObjekt(state, mv);

  const mieterAdresse = ka.auszahlung_an_name ? ka.auszahlung_an_name : "";

  const kaution = parseFloat(ka.kaution_eingezahlt || v.kaution || "0");
  const zinsen = parseFloat(ka.zinsen || "0");
  const offMiete = parseFloat(ka.offene_mieten || "0");
  const schaden = parseFloat(ka.schadensersatz || "0");
  const einbBka = parseFloat(ka.einbehalt_bka || "0");
  const verfuegbar = kaution + zinsen;
  const abzuege = offMiete + schaden + einbBka;
  const auszahlung = verfuegbar - abzuege;

  return (
    <LetterPage id="doc-kautionsabrechnung" vermieter={vermieterList} mieter={mv.personen} ort="Bremerhaven" datum={ka.datum_heute} subject={`Kautionsabrechnung zum Mietverhältnis ${fallback(einheit && einheit.bezeichnung, "")} – Mietende ${fmtDate(az.datum)}`} mieterAdresse={mieterAdresse}>
      <SubText>{getAnrede(mv.personen)}</SubText>
      <SubText>im Anschluss an Ihren Auszug aus der o. g. Wohnung am {fmtDate(az.datum)} erhalten Sie hiermit die Abrechnung Ihrer Mietkaution.</SubText>

      <table style={{ width: "100%", borderCollapse: "collapse", marginTop: "12pt", fontSize: "10.5pt" }}><tbody>
        <tr><td colSpan="2" style={{ padding: "4pt 0", fontWeight: 700, borderBottom: "0.5pt solid rgba(26,23,20,0.25)" }}>Guthaben</td></tr>

        <tr style={{ fontWeight: 600, borderTop: "0.5pt solid rgba(26,23,20,0.15)" }}><td style={{ padding: "3pt 0" }}>Verfügbare Sicherheit:</td><td style={{ textAlign: "right" }}>{fmtEUR(verfuegbar)}</td></tr>

        <tr><td colSpan="2" style={{ padding: "10pt 0 4pt", fontWeight: 700, borderBottom: "0.5pt solid rgba(26,23,20,0.25)" }}>Abzüge</td></tr>
        {offMiete > 0 && (
          <tr><td style={{ padding: "3pt 0" }}>Offene Mieten / Nebenkosten{ka.offene_mieten_grund ? ` (${ka.offene_mieten_grund})` : ""}:</td><td style={{ textAlign: "right" }}>{fmtEUR(offMiete)}</td></tr>
        )}
        {schaden > 0 && (
          <tr><td style={{ padding: "3pt 0", verticalAlign: "top" }}>Schadensersatz für nicht vertragsgemäße Rückgabe{ka.schadensersatz_details ? <div style={{ fontSize: "9.5pt", color: "#8A8377", marginLeft: "8pt" }}>{ka.schadensersatz_details}</div> : null}:</td><td style={{ textAlign: "right", verticalAlign: "top" }}>{fmtEUR(schaden)}</td></tr>
        )}
        {einbBka > 0 && (

        <tr style={{ fontWeight: 600, borderTop: "0.5pt solid rgba(26,23,20,0.15)" }}><td style={{ padding: "3pt 0" }}>Summe Abzüge:</td><td style={{ textAlign: "right" }}>{fmtEUR(abzuege)}</td></tr>

        <tr><td colSpan="2" style={{ padding: "10pt 0 4pt", fontWeight: 700, borderBottom: "0.5pt solid #1A1714" }}>Ergebnis</td></tr>

      </tbody></table>

      {auszahlung > 0 && (
        <SubText style={{ marginTop: "12pt" }}>
          Der Betrag in Höhe von <strong>{fmtEUR(auszahlung)}</strong> wird innerhalb von 14 Tagen nach Zugang dieses Schreibens auf das von Ihnen benannte Konto überwiesen:
          <br />Kontoinhaber: {fallback(ka.auszahlung_an_name)}<br />IBAN: {fallback(ka.auszahlung_iban)}
        </SubText>
      )}
      {auszahlung < 0 && (
        <SubText style={{ marginTop: "12pt" }}>
          Der offene Betrag von <strong>{fmtEUR(Math.abs(auszahlung))}</strong> wird hiermit zur Zahlung fällig. Bitte überweisen Sie diesen innerhalb von 14 Tagen auf das Ihnen aus dem Mietverhältnis bekannte Konto.
        </SubText>
      )}
      {einbBka > 0 && (
        <SubText style={{ fontSize: "9.5pt", color: "#8A8377", marginTop: "12pt", fontStyle: "italic" }}>
          Hinweis: Der Einbehalt für die noch zu erstellende Betriebskostenabrechnung wird nach Vorliegen der Abrechnung mit Ihnen abgerechnet und ein etwaiger Restbetrag erstattet (BGH VIII ZR 71/05).
        </SubText>
      )}
    </LetterPage>
  );
}

function StammdatenForm({ state, setState }) {
  const addVermieter = () => setState((s) => ({ ...s, vermieter: [...s.vermieter, { id: `vm_${Date.now()}`, name: "", anschrift: "", plz_ort: "", telefon: "", email: "" }] }));
  const updateVermieter = (id, k, v) => setState((s) => ({ ...s, vermieter: s.vermieter.map((vm) => vm.id === id ? { ...vm, [k]: v } : vm) }));
  const removeVermieter = (id) => setState((s) => ({ ...s, vermieter: s.vermieter.filter((vm) => vm.id !== id), objekte: s.objekte.map((o) => ({ ...o, vermieter_ids: o.vermieter_ids.filter((vid) => vid !== id) })) }));
  const addObjekt = () => {
    const id = `obj_${Date.now()}`;
    setState((s) => ({ ...s, objekte: [...s.objekte, { id, name: "", adresse: "", plz_ort: "", baujahr: "", heizungsart: "", energieklasse: "", vermieter_ids: s.vermieter.map((v) => v.id), iban: "", bank: "", kontoinhaber: "", einheiten: [] }] }));
  };
  const updateObjekt = (id, k, v) => setState((s) => ({ ...s, objekte: s.objekte.map((o) => o.id === id ? { ...o, [k]: v } : o) }));
  const deleteObjekt = (id) => {
    if (!confirm("Objekt und alle zugehörigen Einheiten und Mietverhältnisse unwiderruflich löschen?")) return;
    setState((s) => ({ ...s, objekte: s.objekte.filter((o) => o.id !== id), mietverhaeltnisse: s.mietverhaeltnisse.filter((mv) => mv.objekt_id !== id) }));
  };
  const toggleVAssign = (objId, vmId) => setState((s) => ({ ...s, objekte: s.objekte.map((o) => { if (o.id !== objId) return o; const has = o.vermieter_ids.includes(vmId); return { ...o, vermieter_ids: has ? o.vermieter_ids.filter((x) => x !== vmId) : [...o.vermieter_ids, vmId] }; }) }));
  const addEinheit = (objId) => {
    const newEh = { id: `eh_${Date.now()}`, bezeichnung: "", etage: "", lage: "", zimmer: "", wohnflaeche: "", nebenraeume: "",
      strom_nr: "", gas_nr: "", wasser_kalt_nr: "", wasser_warm_nr: "", heizung_nr: "" };
    setState((s) => ({ ...s, objekte: s.objekte.map((o) => o.id === objId ? { ...o, einheiten: [...o.einheiten, newEh] } : o) }));
  };
  const updateEinheit = (objId, ehId, k, v) => setState((s) => ({ ...s, objekte: s.objekte.map((o) => o.id !== objId ? o : { ...o, einheiten: o.einheiten.map((eh) => eh.id === ehId ? { ...eh, [k]: v } : eh) }) }));
  const removeEinheit = (objId, ehId) => {
    if (!confirm("Einheit und zugehörige Mietverhältnisse unwiderruflich löschen?")) return;
    setState((s) => ({ ...s, objekte: s.objekte.map((o) => o.id !== objId ? o : { ...o, einheiten: o.einheiten.filter((eh) => eh.id !== ehId) }), mietverhaeltnisse: s.mietverhaeltnisse.filter((mv) => mv.einheit_id !== ehId) }));
  };

  return (
    <div className="space-y-6">
      <InfoBox variant="info">Stammdaten werden lokal im Browser gespeichert. Bei gemeinsamem Eigentum mehrere Vermieter anlegen und pro Objekt zuordnen.</InfoBox>
      <Section title="Vermieter" icon="users" action={<Btn variant="secondary" size="sm" icon="plus" onClick={addVermieter}>Vermieter</Btn>}>
        {state.vermieter.length === 0 && <p className="text-sm text-stone-500 italic">Noch kein Vermieter angelegt.</p>}
        {state.vermieter.map((vm, idx) => (
          <div key={vm.id} className="p-3 bg-stone-50 border border-stone-200 rounded-lg space-y-3">
            <div className="flex items-center justify-between">
              <span className="text-xs uppercase tracking-wide font-semibold text-stone-600">Vermieter {idx + 1}</span>
              <Btn variant="ghost" size="sm" icon="trash" onClick={() => removeVermieter(vm.id)}>Entfernen</Btn>
            </div>
            <div><Label>Name</Label><Input value={vm.name} onChange={(e) => updateVermieter(vm.id, "name", e.target.value)} placeholder="Philipp Mustermann" /></div>
            <div className="grid grid-cols-2 gap-3">
              <div><Label>Straße, Hausnummer</Label><Input value={vm.anschrift} onChange={(e) => updateVermieter(vm.id, "anschrift", e.target.value)} /></div>
              <div><Label>PLZ, Ort</Label><Input value={vm.plz_ort} onChange={(e) => updateVermieter(vm.id, "plz_ort", e.target.value)} /></div>
            </div>

        {state.objekte.length === 0 && <p className="text-sm text-stone-500 italic">Noch keine Objekte angelegt.</p>}

              <div><Label>Adresse</Label><Input value={o.adresse} onChange={(e) => updateObjekt(o.id, "adresse", e.target.value)} /></div>
              <div><Label>PLZ, Ort</Label><Input value={o.plz_ort} onChange={(e) => updateObjekt(o.id, "plz_ort", e.target.value)} /></div>
            </div>
            <div className="grid grid-cols-3 gap-3">
              <div><Label>Baujahr</Label><Input value={o.baujahr} onChange={(e) => updateObjekt(o.id, "baujahr", e.target.value)} /></div>
              <div><Label>Heizungsart</Label><Input value={o.heizungsart} onChange={(e) => updateObjekt(o.id, "heizungsart", e.target.value)} /></div>

            </div>
            <div className="pt-2 border-t border-stone-200">
              <Label>Energieausweis (Daten für Mietvertrags-Anlage)</Label>
              <div className="grid grid-cols-2 gap-2 mt-1">
                <Select value={o.energie_typ || ""} onChange={(e) => updateObjekt(o.id, "energie_typ", e.target.value)}>
                  <option value="">– Ausweistyp –</option>
                  <option value="verbrauch">Verbrauchsausweis</option>
                  <option value="bedarf">Bedarfsausweis</option>
                </Select>
                <Input value={o.energie_verbrauch || ""} onChange={(e) => updateObjekt(o.id, "energie_verbrauch", e.target.value)} placeholder="Kennwert kWh/(m²·a)" />
                <Input value={o.energie_traeger || ""} onChange={(e) => updateObjekt(o.id, "energie_traeger", e.target.value)} placeholder="Energieträger (Gas, Öl, Fernwärme...)" />
                <Input type="date" value={o.energie_gueltig_bis || ""} onChange={(e) => updateObjekt(o.id, "energie_gueltig_bis", e.target.value)} placeholder="Gültig bis" />

                <Label>Vermieter dieses Objekts</Label>
                <div className="flex flex-wrap gap-2 mt-1">
                  {state.vermieter.map((vm) => (

                      <input type="checkbox" checked={o.vermieter_ids.includes(vm.id)} onChange={() => toggleVAssign(o.id, vm.id)} className="w-3.5 h-3.5 accent-stone-900" />

function MietverhaeltnisListe({ state, setState }) {
  const createMV = () => {
    const mv = newMietverhaeltnis();
    mv.bezeichnung = `Mietverhältnis ${state.mietverhaeltnisse.length + 1}`;
    setState((s) => ({ ...s, mietverhaeltnisse: [...s.mietverhaeltnisse, mv], aktuellesMVId: mv.id }));
  };
  const removeMV = (id) => {
    if (!confirm("Dieses Mietverhältnis und alle zugehörigen Daten unwiderruflich löschen?")) return;
    setState((s) => {
      const filtered = s.mietverhaeltnisse.filter((mv) => mv.id !== id);
      return { ...s, mietverhaeltnisse: filtered, aktuellesMVId: s.aktuellesMVId === id ? (filtered[0] ? filtered[0].id : null) : s.aktuellesMVId };
    });
  };
  const updateMV = (id, patch) => setState((s) => ({ ...s, mietverhaeltnisse: s.mietverhaeltnisse.map((mv) => mv.id === id ? { ...mv, ...patch } : mv) }));
  const setActive = (id) => setState((s) => ({ ...s, aktuellesMVId: id }));
  const statusColor = { neu: "bg-sky-100 text-sky-800", aktiv: "bg-emerald-100 text-emerald-800", gekuendigt: "bg-amber-100 text-amber-800", beendet: "bg-stone-200 text-stone-600" };

  return (
    <div className="space-y-6">
      <InfoBox variant="info">Hier verwaltest du alle Mietverhältnisse. Jedes hat seinen eigenen Vertrag, Übergabeprotokoll, Möbel und Schreiben. Das aktive Mietverhältnis ist die Grundlage für alle Tabs.</InfoBox>
      <Btn variant="primary" icon="plus" onClick={createMV}>Neues Mietverhältnis</Btn>
      {state.mietverhaeltnisse.length === 0 && <p className="text-sm text-stone-500 italic">Noch kein Mietverhältnis angelegt.</p>}
      <div className="space-y-2">
        {state.mietverhaeltnisse.map((mv) => {
          const objekt = state.objekte.find((o) => o.id === mv.objekt_id);
          const einheit = objekt && objekt.einheiten.find((e) => e.id === mv.einheit_id);
          const isActive = state.aktuellesMVId === mv.id;
          return (
            <div key={mv.id} className={`p-3 border rounded-lg transition ${isActive ? "border-stone-900 bg-stone-50 ring-2 ring-stone-900/10" : "border-stone-200 bg-white"}`}>
              <div className="flex items-start justify-between gap-2 mb-2">
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 mb-1">
                    <span className={`text-[10px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded ${statusColor[mv.status]}`}>{mv.status}</span>
                    {isActive && <span className="text-[10px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded bg-amber-200 text-amber-900">aktiv</span>}
                  </div>
                  <div className="text-sm font-semibold text-stone-900 truncate">{mv.personen.map((p) => p.name).filter(Boolean).join(", ") || mv.bezeichnung || "Neues Mietverhältnis"}</div>
                  <div className="text-xs text-stone-500 truncate">
                    {objekt ? `${objekt.name || objekt.adresse}` : "kein Objekt"}{einheit && ` · ${einheit.bezeichnung}`}
                    {mv.vertrag.mietbeginn && ` · ab ${fmtDateShort(mv.vertrag.mietbeginn)}`}
                    {mv.vertrag.grundmiete && ` · ${fmtEUR(mv.vertrag.grundmiete)}`}
                  </div>
                </div>
                <div className="flex flex-col gap-1">
                  {!isActive && <Btn variant="secondary" size="sm" onClick={() => setActive(mv.id)}>Aktivieren</Btn>}
                  <Btn variant="ghost" size="sm" icon="trash" onClick={() => removeMV(mv.id)}>Löschen</Btn>
                </div>
              </div>
              {isActive && (
                <div className="mt-3 pt-3 border-t border-stone-200 space-y-2">
                  <div><Label>Interne Bezeichnung</Label><Input value={mv.bezeichnung} onChange={(e) => updateMV(mv.id, { bezeichnung: e.target.value })} placeholder="z. B. Müller / 2.OG" /></div>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <Label>Objekt</Label>
                      <Select value={mv.objekt_id || ""} onChange={(e) => updateMV(mv.id, { objekt_id: e.target.value || null, einheit_id: null })}>
                        <option value="">– bitte wählen –</option>
                        {state.objekte.map((o) => <option key={o.id} value={o.id}>{o.name || o.adresse}</option>)}
                      </Select>
                    </div>
                    <div>
                      <Label>Einheit</Label>
                      <Select value={mv.einheit_id || ""} onChange={(e) => updateMV(mv.id, { einheit_id: e.target.value || null })} disabled={!objekt}>
                        <option value="">– bitte wählen –</option>
                        {objekt && objekt.einheiten.map((eh) => <option key={eh.id} value={eh.id}>{eh.bezeichnung || "(unbenannt)"} · {eh.etage}</option>)}
                      </Select>
                    </div>
                  </div>
                  <div>
                    <Label>Status</Label>
                    <Select value={mv.status} onChange={(e) => updateMV(mv.id, { status: e.target.value })}>
                      <option value="neu">neu (Entwurf)</option>
                      <option value="aktiv">aktiv (läuft)</option>
                      <option value="gekuendigt">gekündigt</option>
                      <option value="beendet">beendet (Archiv)</option>
                    </Select>
                  </div>
                  <div><Label>Notizen</Label><Textarea rows={2} value={mv.notizen} onChange={(e) => updateMV(mv.id, { notizen: e.target.value })} placeholder="Interne Notizen (nicht im Vertrag sichtbar)" /></div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}


function VertragForm({ state, setState }) {
  const mv = getActiveMV(state);
  if (!mv) return <InfoBox variant="warn">Bitte zuerst unter <strong>Mietverhältnisse</strong> ein Mietverhältnis anlegen und aktivieren.</InfoBox>;
  const objekt = getMVObjekt(state, mv);
  const einheit = getMVEinheit(state, mv);
  const updateMV = (patch) => setState((s) => ({ ...s, mietverhaeltnisse: s.mietverhaeltnisse.map((m) => m.id === mv.id ? { ...m, ...patch } : m) }));
  const updateVertrag = (k, v) => updateMV({ vertrag: { ...mv.vertrag, [k]: v } });
  const updatePerson = (i, k, v) => updateMV({ personen: mv.personen.map((p, idx) => idx === i ? { ...p, [k]: v } : p) });
  const addPerson = () => updateMV({ personen: [...mv.personen, { name: "", geburtsdatum: "", anschrift_alt: "", telefon: "", email: "", ausweis_nr: "" }] });
  const removePerson = (i) => updateMV({ personen: mv.personen.filter((_, idx) => idx !== i) });
  const addStaffel = () => updateVertrag("staffeln", [...mv.vertrag.staffeln, { datum: "", betrag: "" }]);
  const updateStaffel = (i, k, v) => updateVertrag("staffeln", mv.vertrag.staffeln.map((st, idx) => idx === i ? { ...st, [k]: v } : st));
  const removeStaffel = (i) => updateVertrag("staffeln", mv.vertrag.staffeln.filter((_, idx) => idx !== i));
  const addKlausel = () => updateVertrag("eigene_klauseln", [...mv.vertrag.eigene_klauseln, { id: `kl_${Date.now()}`, titel: "", text: "" }]);
  const updateKlausel = (id, k, v) => updateVertrag("eigene_klauseln", mv.vertrag.eigene_klauseln.map((kl) => kl.id === id ? { ...kl, [k]: v } : kl));
  const removeKlausel = (id) => updateVertrag("eigene_klauseln", mv.vertrag.eigene_klauseln.filter((kl) => kl.id !== id));
  const addMoebel = (raum = "") => updateMV({ moebel: [...mv.moebel, { bezeichnung: "", zustand: "neuwertig", raum, zeitwert: "", anschaffungsjahr: "" }] });
  const updateMoebel = (i, k, v) => updateMV({ moebel: mv.moebel.map((m, idx) => idx === i ? { ...m, [k]: v } : m) });
  const removeMoebel = (i) => updateMV({ moebel: mv.moebel.filter((_, idx) => idx !== i) });

  return (
    <div className="space-y-6">
      <InfoBox variant={objekt && einheit ? "success" : "warn"}>
        Aktives Mietverhältnis: <strong>{mv.personen.map((p) => p.name).filter(Boolean).join(", ") || mv.bezeichnung || "(unbenannt)"}</strong>
        {objekt ? <> · {objekt.name || objekt.adresse}</> : <> · <em>kein Objekt zugeordnet</em></>}
        {einheit ? <> · {einheit.bezeichnung}</> : (objekt && <> · <em>keine Einheit zugeordnet</em></>)}

      <Section title="Vertragstyp" icon="fileText">
        <div className="grid grid-cols-3 gap-2">
          {Object.entries(VERTRAGSTYPEN).map(([k, v]) => (
            <button key={k} onClick={() => updateVertrag("typ", k)} className={`p-3 border-2 rounded-lg text-left transition ${mv.vertrag.typ === k ? "border-stone-900 bg-stone-900 text-white" : "border-stone-200 bg-white hover:border-stone-400"}`}>
              <div className="text-xs font-semibold uppercase tracking-wider mb-1">{mv.vertrag.typ === k && <Icon name="check" size={12} className="inline mr-1" />}{v.label}</div>
              <div className={`text-[10px] leading-snug ${mv.vertrag.typ === k ? "text-stone-300" : "text-stone-500"}`}>
                {k === "staffel" && "Festgelegte Erhöhungen"}
                {k === "index" && "Anpassung über VPI"}
                {k === "moebliert" && "Befristet + Inventar"}
              </div>
            </button>
          ))}
        </div>
      </Section>
      <Section title="Mieter" icon="user">
        {mv.personen.map((m, i) => (
          <div key={i} className="p-3 bg-stone-50 border border-stone-200 rounded-lg space-y-3">
            <div className="flex items-center justify-between">
              <span className="text-xs uppercase tracking-wide font-semibold text-stone-600">{i === 0 ? "Hauptmieter" : `Mitmieter ${i}`}</span>
              {mv.personen.length > 1 && <Btn variant="ghost" size="sm" icon="trash" onClick={() => removePerson(i)}>Entfernen</Btn>}
            </div>
            <div><Label>Name</Label><Input value={m.name} onChange={(e) => updatePerson(i, "name", e.target.value)} placeholder="Max Mustermann" /></div>
            <div className="grid grid-cols-2 gap-3">
              <div><Label>Geburtsdatum</Label><Input type="date" value={m.geburtsdatum} onChange={(e) => updatePerson(i, "geburtsdatum", e.target.value)} /></div>
              <div><Label>Telefon</Label><Input value={m.telefon} onChange={(e) => updatePerson(i, "telefon", e.target.value)} /></div>
            </div>
            <div><Label>Bisherige Anschrift</Label><Input value={m.anschrift_alt} onChange={(e) => updatePerson(i, "anschrift_alt", e.target.value)} /></div>
            <div className="grid grid-cols-2 gap-3">
              <div><Label>E-Mail</Label><Input value={m.email} onChange={(e) => updatePerson(i, "email", e.target.value)} /></div>
              <div><Label>Ausweis-Nr. <span className="text-stone-400 font-normal normal-case">(intern)</span></Label><Input value={m.ausweis_nr || ""} onChange={(e) => updatePerson(i, "ausweis_nr", e.target.value)} placeholder="z. B. T22000129" /></div>

      <Section title="Mietzeit" icon="calendar">

        {mv.vertrag.typ === "moebliert" && (<>
          <div><Label>Mietende</Label><Input type="date" value={mv.vertrag.befristung_ende} onChange={(e) => updateVertrag("befristung_ende", e.target.value)} /></div>

              <option value="">– bitte wählen –</option>

              <option value="Der Vermieter beabsichtigt, die Räume nach Ablauf der Mietzeit in zulässiger Weise zu beseitigen oder so wesentlich zu verändern oder instand zu setzen, dass die Maßnahmen durch eine Fortsetzung des Mietverhältnisses erheblich erschwert würden.">Abriss / Modernisierung</option>

          </div>
          <InfoBox variant="legal"><strong>Achtung Befristung:</strong> Floskeln wie „Sanierung" reichen vor Gericht NICHT. Der Grund muss konkret beschrieben sein. Wenn die Maßnahme zum Befristungsende nicht durchgeführt wird, kann der Mieter Fortsetzung des Mietverhältnisses verlangen und Schadensersatz fordern (§ 575 Abs. 3 BGB). Hebe Belege auf (Angebote, Baugenehmigung, Architektenpläne).</InfoBox>
          <div className="mt-2 p-3 bg-linen border border-ink/10 rounded-sm space-y-3">
            <Label>Mietverhältnis bei Verlängerung / Fortsetzung</Label>

              <option value="fix">Fixe Miete (einfach)</option>
              <option value="index">Indexmiete ab Verlängerung (§ 557b BGB)</option>
              <option value="staffel">Staffelmiete ab Verlängerung (§ 557a BGB)</option>
            </Select>
            <div>
              <Label>{(mv.vertrag.verlaengerung_typ === "staffel") ? "Startmiete der Staffel €" : "Neue Nettokaltmiete €"}</Label>
              <Input value={mv.vertrag.verlaengerung_miete || ""} onChange={(e) => updateVertrag("verlaengerung_miete", e.target.value)} placeholder="z. B. 550,00" />
              <p className="text-xs text-smoke mt-1">
                {(!mv.vertrag.verlaengerung_typ || mv.vertrag.verlaengerung_typ === "fix") && "Feste Miete gilt ab Tag 1 der Verlängerung. Klar und einfach."}
